<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Call Calendar">
  <link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;Call Calendar&quot;,&quot;short_name&quot;:&quot;Calls&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;orientation&quot;:&quot;landscape&quot;,&quot;background_color&quot;:&quot;%2337474F&quot;,&quot;theme_color&quot;:&quot;%2337474F&quot;}">
  <title>Call Calendar</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --topbar-h: 56px;
      --oncall-single: #FFF176;
      --oncall-double: #FFB74D;
      --oncall-exception: #A5D6A7;
      --border: #D0D7DE;
      --header-bg: #37474F;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --col: repeat(6, minmax(0, 1fr));
    }

    body {
      font-family: var(--font);
      background: #F0F2F5;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 900px;
      max-width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      position: relative;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--header-bg);
      color: white;
      flex-shrink: 0;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .month-nav { display: flex; align-items: center; gap: 8px; }

    .month-nav button {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .month-nav button:hover { background: rgba(255,255,255,0.28); }

    .month-label {
      font-size: 1rem;
      font-weight: 600;
      min-width: 148px;
      text-align: center;
    }

    .topbar-actions { display: flex; gap: 6px; }

    .icon-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover { background: rgba(255,255,255,0.28); }

    /* ── Calendar container ── */
    .cal-container {
    }

    /* ── Day-of-week header ── */
    .day-headers {
      display: grid;
      grid-template-columns: var(--col);
      background: var(--header-bg);
      position: sticky;
      top: var(--topbar-h);
      z-index: 10;
      flex-shrink: 0;
    }

    .day-headers > div {
      padding: 5px 4px;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 600;
      color: rgba(255,255,255,0.9);
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .day-headers > div:last-child { border-right: none; }
    .day-headers .weekend { color: rgba(255,255,255,0.6); }

    /* ── Calendar grid ── */
    .cal-grid {
      display: grid;
      grid-template-columns: var(--col);
      gap: 1px;
      background: var(--border);
    }

    /* ── Day cell ── */
    .day-cell {
      background: white;
      padding: 4px 3px 5px;
      min-height: 0;
    }

    .day-cell.weekend { background: #F8F9FA; }
    .day-cell.out-of-month { background: #ECEEF1; }

    /* Date number — spans full cell width, colored when on-call */
    .cell-date {
      font-size: 0.72rem;
      font-weight: 700;
      color: #546E7A;
      /* bleed to edges of the padded cell */
      margin: -4px -3px 3px -3px;
      padding: 3px 5px;
      line-height: 1.4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }

    .wk-selects { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }

    .backup-select {
      font-size: 0.6rem;
      font-weight: 600;
      color: #37474F;
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(0,0,0,0.15);
      border-radius: 3px;
      padding: 1px 2px;
      cursor: pointer;
      max-width: 52px;
      width: 52px;
    }
    .backup-select:focus { outline: none; border-color: #1565C0; }
    .bari-call-select { background: rgba(165,214,167,0.55); border-color: rgba(56,142,60,0.3); }

    /* ── Topbar day-summary table ── */
    .day-summary {
      display: grid;
      grid-template-columns: auto auto;
      gap: 1px 8px;
      align-items: center;
    }
    .day-summary .ds-label {
      font-size: 0.6rem;
      font-weight: 700;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      text-align: right;
    }
    .day-summary .ds-value {
      font-size: 0.68rem;
      font-weight: 600;
      color: white;
      white-space: nowrap;
    }
    .day-summary .ds-value.empty { color: rgba(255,255,255,0.3); }

    .cell-date { background: #CFD8DC; color: #37474F; }

    .today .cell-date { background: #1565C0; color: white; }

    .out-of-month .cell-date { color: #AABBCC; }


    /* ── Person row ── */
    .person-row {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 2px 3px;
      border-radius: 3px;
      margin-bottom: 2px;
      cursor: pointer;
      min-height: 20px;
      transition: filter 0.08s;
      overflow: hidden;
    }

    .person-row:hover  { filter: brightness(0.89); }
    .person-row:active { filter: brightness(0.8); }

    .person-row { background: transparent; }
    .editing-highlight { outline: 2px solid #1565C0; outline-offset: 1px; border-radius: 3px; }

    .am-val.oncall-single, .pm-val.oncall-single { background: var(--oncall-single); border: 1px solid #F9A825; padding: 1px 3px; }
    .am-val.oncall-double, .pm-val.oncall-double { background: var(--oncall-double); border: 1px solid #E65100; padding: 1px 3px; }
    .am-val.exception { background: var(--oncall-exception); border: 1px solid #388E3C; padding: 1px 3px; }
    .am-val.oncall-single, .am-val.oncall-double, .am-val.exception { border-radius: 2px 0 0 2px; border-right: none; }
    .pm-val.oncall-single, .pm-val.oncall-double { border-radius: 0 2px 2px 0; border-left: none; }

    /* Person name */
    .pname {
      font-size: 0.58rem;
      font-weight: 700;
      color: #37474F;
      min-width: 26px;
      max-width: 26px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* AM / PM slots */
    .slots {
      display: flex;
      align-items: center;
      gap: 0;
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .am-val, .pm-val {
      font-size: 0.68rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
      text-align: center;
    }

    .am-val { color: #1A237E; }
    .pm-val { color: #4A148C; }
    .am-val.empty, .pm-val.empty { color: #B0BEC5; }
    .am-val.hosp, .pm-val.hosp { font-weight: 700; }

    .slot-sep {
      display: none;
      flex-shrink: 0;
      padding: 0 1px;
    }

    /* CLOSED row */
    .closed-row {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px 3px;
      border-radius: 3px;
      margin-bottom: 2px;
      min-height: 20px;
      background: #CFD8DC;
      cursor: pointer;
      transition: filter 0.08s;
    }

    .closed-row:hover { filter: brightness(0.9); }

    .pname-closed {
      font-size: 0.58rem;
      font-weight: 700;
      color: #37474F;
      min-width: 26px;
      flex-shrink: 0;
    }

    .closed-label {
      font-size: 0.55rem;
      font-weight: 800;
      color: #455A64;
      letter-spacing: 0.3px;
      flex: 1;
      text-align: center;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      gap: 14px;
      padding: 5px 14px;
      background: white;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      color: #546E7A;
    }

    .legend-swatch {
      width: 13px;
      height: 13px;
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,0.12);
    }

    /* ── Bottom-sheet base ── */
    .sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .sheet-overlay.open { display: flex; }

    .sheet {
      background: white;
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 380px;
      padding: 14px 16px 22px;
      max-height: 88vh;
      overflow-y: auto;
    }

    .sheet-handle {
      width: 56px;
      height: 20px;
      margin: 0 auto 12px;
      cursor: grab;
      background-image: repeating-linear-gradient(
        to bottom,
        transparent 0px, transparent 3px,
        #C0C8D0 3px, #C0C8D0 5px
      );
      border-radius: 2px;
      opacity: 0.8;
    }
    .sheet-handle:hover { opacity: 1; }
    .sheet-handle:active { cursor: grabbing; }

    .sheet-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .sheet-title {
      font-size: 1rem;
      font-weight: 700;
      color: #263238;
    }

    .btn-clear-inline {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 9px;
      border: 1.5px solid #FFCDD2;
      border-radius: 6px;
      background: #FFEBEE;
      color: #B71C1C;
      cursor: pointer;
      flex-shrink: 0;
    }
    .btn-clear-inline:hover { background: #FFCDD2; }

    /* ── Edit panel two-column layout ── */
    .edit-layout {
      display: flex;
      gap: 12px;
      align-items: stretch;
    }

    .assign-col { flex: 1; min-width: 0; }

    .right-col {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    /* tighter grid for the oncall section */
    .cg-oncall { grid-template-columns: max-content 36px 36px; }

    .action-grid {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      margin-top: auto;
    }

    .action-grid .btn {
      padding: 9px 18px;
      font-size: 0.8rem;
      flex: none;
    }

    /* ── Choice grid (edit modal) ── */
    .cg-grid {
      display: grid;
      grid-template-columns: max-content 42px 42px;
      gap: 3px;
      margin-bottom: 8px;
    }

    .cg-col-hdr {
      text-align: center;
      font-size: 0.68rem;
      font-weight: 700;
      color: #607D8B;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding-bottom: 2px;
    }

    .cg-label {
      font-size: 0.85rem;
      color: #37474F;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 6px 0 0;
      text-align: right;
    }

    .cg-divider {
      grid-column: 1 / -1;
      height: 1px;
      background: #E0E7EF;
      margin: 4px 0;
    }

    .cg-btn {
      height: 30px;
      border: 1.5px solid #D0D7DE;
      border-radius: 5px;
      background: #F5F7F9;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }

    .cg-btn:hover { filter: brightness(0.94); }
    .cg-label.cg-disabled { color: #B0BEC5; }
    .cg-btn.cg-disabled { opacity: 0.25; pointer-events: none; }

    .cg-btn.active {
      background: #455A64;
      border-color: #263238;
    }

    .cg-btn.active::after {
      content: '✓';
      color: white;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .cg-btn.active.single {
      background: var(--oncall-single);
      border-color: #F9A825;
    }

    .cg-btn.active.single::after { color: #4A3000; }

    .cg-btn.active.double {
      background: var(--oncall-double);
      border-color: #E65100;
    }
    .cg-btn.active.double::after { color: #3E0000; }

    .cg-btn.active.exception {
      background: var(--oncall-exception);
      border-color: #388E3C;
    }
    .cg-btn.active.exception::after { color: #1B5E20; }

    .cg-btn.active.double::after { color: #3E0000; }

    .btn-row { display: flex; gap: 10px; margin-top: 20px; }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-save   { background: #37474F; color: white; }
    .btn-save:hover   { background: #263238; }
    .btn-cancel { background: #ECEFF1; color: #37474F; }
    .btn-cancel:hover { background: #CFD8DC; }
    .btn-clear   { background: #FFEBEE; color: #B71C1C; flex: 0 0 auto; padding: 12px 16px; }
    .btn-clear:hover   { background: #FFCDD2; }
    .btn-advance { background: #1565C0; color: white; }
    .btn-advance:hover { background: #0D47A1; }

    /* ── Settings ── */
    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #607D8B;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .staff-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
    .staff-item { display: flex; align-items: center; gap: 8px; cursor: default; }
    .staff-item.drag-over { outline: 2px solid #1565C0; border-radius: 6px; }
    .drag-handle {
      cursor: grab;
      color: #90A4AE;
      font-size: 1.1rem;
      padding: 0 2px;
      user-select: none;
      flex-shrink: 0;
    }
    .drag-handle:active { cursor: grabbing; }

    .staff-item input {
      flex: 1;
      padding: 10px 12px;
      border: 1.5px solid #CFD8DC;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #263238;
    }

    .staff-item input:focus { outline: none; border-color: #37474F; }

    .bariatric-label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      color: #607D8B;
      white-space: nowrap;
      flex-shrink: 0;
      cursor: pointer;
    }
    .bariatric-label input[type="checkbox"] {
      width: 14px;
      height: 14px;
      margin: 0;
      accent-color: #37474F;
      cursor: pointer;
      flex-shrink: 0;
      border: none;
      padding: 0;
    }

    .remove-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: #FFEBEE;
      color: #B71C1C;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    .add-btn {
      width: 100%;
      padding: 10px;
      border: 2px dashed #B0BEC5;
      border-radius: 8px;
      background: none;
      color: #607D8B;
      font-size: 0.9rem;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .add-btn:hover { background: #F5F5F5; }

    .data-btn {
      display: block;
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #CFD8DC;
      border-radius: 8px;
      background: white;
      color: #37474F;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      text-align: left;
      margin-bottom: 8px;
    }

    .data-btn:hover { background: #ECEFF1; }
    .data-btn.danger { color: #B71C1C; border-color: #FFCDD2; }
    .data-btn.danger:hover { background: #FFEBEE; }

    .month-section { }
    .month-heading {
      background: #546E7A;
      color: white;
      padding: 6px 10px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .scroll-sentinel { height: 1px; }

    /* ── Totals table ── */
    .totals-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 0.88rem;
    }
    .totals-table th {
      text-align: center;
      padding: 6px 10px;
      font-size: 0.72rem;
      font-weight: 700;
      color: #607D8B;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #D0D7DE;
    }
    .totals-table th:first-child { text-align: left; }
    .totals-table td {
      padding: 7px 10px;
      border-bottom: 1px solid #ECEFF1;
      text-align: center;
      color: #37474F;
    }
    .totals-table td:first-child { text-align: left; font-weight: 600; }
    .totals-table tr:last-child td { border-bottom: none; }
    .totals-table .total-row td {
      font-weight: 700;
      border-top: 2px solid #D0D7DE;
      border-bottom: none;
      color: #263238;
    }
    .totals-frye  { background: #FFFDE7; }
    .totals-cmvc  { background: #FFF3E0; }

    /* ── Portrait nudge (phones only) ── */
    .rotate-nudge {
      display: none;
    }

    @media screen and (max-width: 600px) and (orientation: portrait) {
      .rotate-nudge {
        display: flex;
        position: fixed;
        inset: 0;
        z-index: 999;
        background: #37474F;
        color: white;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        padding: 32px;
        text-align: center;
      }
      .rotate-nudge-icon {
        font-size: 3rem;
        animation: rotate-hint 2s ease-in-out infinite;
      }
      .rotate-nudge-title {
        font-size: 1.1rem;
        font-weight: 700;
      }
      .rotate-nudge-sub {
        font-size: 0.85rem;
        color: rgba(255,255,255,0.7);
        line-height: 1.5;
      }
      .rotate-nudge-dismiss {
        margin-top: 8px;
        padding: 10px 24px;
        border: 1.5px solid rgba(255,255,255,0.4);
        border-radius: 8px;
        background: transparent;
        color: white;
        font-size: 0.85rem;
        cursor: pointer;
      }
      @keyframes rotate-hint {
        0%   { transform: rotate(0deg); }
        30%  { transform: rotate(90deg); }
        70%  { transform: rotate(90deg); }
        100% { transform: rotate(0deg); }
      }
    }
  </style>
</head>
<body>

  <!-- Portrait nudge (phones only) -->
  <div class="rotate-nudge" id="rotateNudge">
    <div class="rotate-nudge-icon">&#x21BA;</div>
    <div class="rotate-nudge-title">Rotate your device</div>
    <div class="rotate-nudge-sub">This calendar works best in landscape orientation.</div>
    <button class="rotate-nudge-dismiss" id="rotateNudgeDismiss">Continue anyway</button>
  </div>

  <div class="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="month-nav">
      <button id="prevMonth" aria-label="Previous month">&#8249;</button>
      <span class="month-label" id="monthLabel"></span>
      <button id="nextMonth" aria-label="Next month">&#8250;</button>
    </div>
    <div class="day-summary" id="daySummary">
      <span class="ds-label">Call</span>     <span class="ds-value empty" id="ds-call">—</span>
      <span class="ds-label">Backup</span>   <span class="ds-value empty" id="ds-backup">—</span>
      <span class="ds-label">Bariatric</span><span class="ds-value empty" id="ds-bari">—</span>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="todayBtn" title="Go to today">&#9711;</button>
      <button class="icon-btn" id="settingsBtn" title="Settings">&#9881;</button>
    </div>
  </div>

  <!-- Calendar -->
  <div class="day-headers">
    <div>Mon</div>
    <div>Tue</div>
    <div>Wed</div>
    <div>Thu</div>
    <div>Fri</div>
    <div class="weekend">Sat / Sun</div>
  </div>
  <div class="cal-container">
  </div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--oncall-single)"></div>
      Single call
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--oncall-double)"></div>
      Double call
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:var(--oncall-exception)"></div>
      Exception
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:#CFD8DC"></div>
      Closed
    </div>
  </div>

  </div><!-- /.app -->

  <!-- Edit modal -->
  <div class="sheet-overlay" id="editOverlay">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title-row">
        <div class="sheet-title" id="editTitle"></div>
        <button class="btn-clear-inline" id="editClearBtn">Clear</button>
      </div>

      <div id="choiceGrid"></div>
    </div>
  </div>

  <!-- Settings panel -->
  <div class="sheet-overlay" id="settingsOverlay">
    <div class="sheet">
      <div class="sheet-title">Settings</div>

      <div class="section-label">Staff</div>
      <div class="staff-list" id="staffList"></div>
      <button class="add-btn" id="addStaffBtn">+ Add person</button>

      <div class="section-label">Data</div>
      <button class="data-btn" id="totalsBtn"><span style="filter:grayscale(1)">🧮</span> Totals</button>
      <button class="data-btn" id="exportBtn">&#8595; Export data as JSON</button>
      <button class="data-btn" id="importBtn">&#8593; Import data from JSON</button>
      <button class="data-btn danger" id="clearMonthBtn">&#x2715; Clear this month's data</button>
      <button class="data-btn danger" id="clearAllBtn">&#x2715; Clear all data</button>

      <div class="btn-row">
        <button class="btn btn-save" id="settingsDone">Done</button>
      </div>
    </div>
  </div>

  <!-- Totals panel -->
  <div class="sheet-overlay" id="totalsOverlay">
    <div class="sheet">
      <div class="sheet-title-row">
        <div class="sheet-title" id="totalsTitle"></div>
        <button class="btn-clear-inline" id="totalsDismiss" style="background:#ECEFF1;border-color:#CFD8DC;color:#37474F;">Close</button>
      </div>
      <div id="totalsTable"></div>
    </div>
  </div>

  <input type="file" id="importFile" accept=".json" style="display:none">

  <script>
    // ─────────────────────────────────────────────
    //  Constants
    // ─────────────────────────────────────────────
    const ASSIGNMENTS = ['', 'ov', 'hosp', 'C-surg', 'F-surg', 'ba-C', 'ba-F', 'admin', 'unavailable', 'CLOSED'];
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const DATA_KEY      = 'callcal_data';
    const STAFF_KEY     = 'callcal_staff';
    const BARIATRIC_KEY = 'callcal_bariatric';
    const BACKUP_KEY    = 'callcal_backup';
    const BARI_CALL_KEY = 'callcal_bari_call';

    // ─────────────────────────────────────────────
    //  State
    // ─────────────────────────────────────────────
    const today = new Date();

    let viewYear  = today.getFullYear();
    let viewMonth = today.getMonth();

    let staff     = loadStaff();
    let data      = loadData();
    let bariatric = loadBariatric();
    let backup    = loadBackup();
    let bariCall  = loadBariCall();
    let editing   = null;

    // ─────────────────────────────────────────────
    //  Persistence
    // ─────────────────────────────────────────────
    function loadData() {
      try { return JSON.parse(localStorage.getItem(DATA_KEY)) || {}; }
      catch { return {}; }
    }

    function saveData() {
      localStorage.setItem(DATA_KEY, JSON.stringify(data));
    }

    function loadStaff() {
      try {
        const s = JSON.parse(localStorage.getItem(STAFF_KEY));
        return Array.isArray(s) && s.length ? s : ['Person 1', 'Person 2', 'Person 3'];
      } catch {
        return ['Person 1', 'Person 2', 'Person 3'];
      }
    }

    function saveStaff() {
      localStorage.setItem(STAFF_KEY, JSON.stringify(staff));
    }

    function loadBariatric() {
      try { return JSON.parse(localStorage.getItem(BARIATRIC_KEY)) || {}; }
      catch { return {}; }
    }

    function saveBariatric() {
      localStorage.setItem(BARIATRIC_KEY, JSON.stringify(bariatric));
    }

    function loadBackup() {
      try { return JSON.parse(localStorage.getItem(BACKUP_KEY)) || {}; }
      catch { return {}; }
    }

    function saveBackup() {
      localStorage.setItem(BACKUP_KEY, JSON.stringify(backup));
    }

    function loadBariCall() {
      try { return JSON.parse(localStorage.getItem(BARI_CALL_KEY)) || {}; }
      catch { return {}; }
    }

    function saveBariCall() {
      localStorage.setItem(BARI_CALL_KEY, JSON.stringify(bariCall));
    }

    function weekKey(sat) {
      // Monday of the week containing sat (sat.getDay() === 6, so mon = sat - 5)
      const mon = new Date(sat);
      mon.setDate(sat.getDate() - 5);
      return `${mon.getFullYear()}-${mon.getMonth()+1}-${mon.getDate()}`;
    }

    function todayWeekKey() {
      // Monday of the current week, matching weekKey() convention
      const d = new Date(today);
      const offset = (d.getDay() + 6) % 7; // Mon=0 … Sun=6
      d.setDate(d.getDate() - offset);
      return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    }

    function todayDataDate() {
      // Sunday's data lives under Saturday in our model
      if (today.getDay() === 0) {
        const sat = new Date(today);
        sat.setDate(today.getDate() - 1);
        return [sat.getFullYear(), sat.getMonth(), sat.getDate()];
      }
      return [today.getFullYear(), today.getMonth(), today.getDate()];
    }

    function cellKey(y, m, d, person) { return `${y}-${m + 1}-${d}-${person}`; }

    function getCell(y, m, d, person) {
      const c = data[cellKey(y, m, d, person)] || {};
      const legacy = c.oncall || 'none'; // backwards compat
      return {
        am:        c.am        || '',
        pm:        c.pm        || '',
        oncall_am: c.oncall_am || legacy,
        oncall_pm: c.oncall_pm || legacy,
        exception: c.exception || false,
      };
    }

    function setCell(y, m, d, person, val) {
      data[cellKey(y, m, d, person)] = val;
      saveData();
    }

    function clearCell(y, m, d, person) {
      delete data[cellKey(y, m, d, person)];
      saveData();
    }

    // ─────────────────────────────────────────────
    //  Helpers
    // ─────────────────────────────────────────────
    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Abbreviate long values to fit narrow cells
    function abbr(s) {
      if (!s) return '';
      if (s === 'unavailable') return 'unavail';
      return s;
    }

    // Truncate name to fit name column
    function shortName(s) {
      return s.length > 4 ? s.slice(0, 4) : s;
    }

    // ─────────────────────────────────────────────
    //  Multi-month scroll rendering
    // ─────────────────────────────────────────────

    function prevMo(y, m) { return m === 0  ? { y: y-1, m: 11 } : { y, m: m-1 }; }
    function nextMo(y, m) { return m === 11 ? { y: y+1, m: 0  } : { y, m: m+1 }; }

    function buildMonthHTML(ry, rm) {
      const firstDow = new Date(ry, rm, 1).getDay();
      const monOffset = firstDow === 0 ? 6 : firstDow - 1;
      const cur = new Date(ry, rm, 1 - monOffset);
      const lastDay = new Date(ry, rm + 1, 0);
      const lastDow = lastDay.getDay();
      const end = new Date(ry, rm + 1, lastDow === 0 ? 0 : 7 - lastDow);
      let html = '';
      while (cur <= end) {
        for (let i = 0; i < 5; i++) {
          html += renderDayCell(new Date(cur), ry, rm);
          cur.setDate(cur.getDate() + 1);
        }
        const sat = new Date(cur); cur.setDate(cur.getDate() + 1);
        const sun = new Date(cur); cur.setDate(cur.getDate() + 1);
        html += renderWeekendCell(sat, sun, ry, rm);
      }
      return html;
    }

    let headingObserver, loadObserver, topSentinel, bottomSentinel;

    function createMonthSection(y, m) {
      const sec = document.createElement('div');
      sec.className = 'month-section';
      sec.id = `month-${y}-${m}`;
      sec.dataset.y = y; sec.dataset.m = m;

      const hdg = document.createElement('div');
      hdg.className = 'month-heading';
      hdg.textContent = `${MONTHS[m]} ${y}`;
      sec.appendChild(hdg);

      const grid = document.createElement('div');
      grid.className = 'cal-grid';
      grid.innerHTML = buildMonthHTML(y, m);
      grid.onclick = e => {
        if (e.target.closest('.backup-select')) return;
        const row = e.target.closest('[data-person]');
        if (!row) return;
        openEdit(+row.dataset.y, +row.dataset.m, +row.dataset.d, row.dataset.person);
      };
      grid.addEventListener('change', e => {
        const sel = e.target.closest('.backup-select');
        if (!sel) return;
        const wk = sel.dataset.wk;
        if (sel.classList.contains('bari-call-select')) {
          if (sel.value) bariCall[wk] = sel.value; else delete bariCall[wk];
          saveBariCall();
        } else {
          if (sel.value) backup[wk] = sel.value; else delete backup[wk];
          saveBackup();
        }
        updateDaySummary();
      });
      sec.appendChild(grid);

      if (headingObserver) headingObserver.observe(hdg);
      return sec;
    }

    function reRenderMonth(y, m) {
      const sec = document.getElementById(`month-${y}-${m}`);
      if (!sec) return;
      sec.querySelector('.cal-grid').innerHTML = buildMonthHTML(y, m);
    }

    function render() {
      document.querySelectorAll('.month-section').forEach(sec => {
        sec.querySelector('.cal-grid').innerHTML = buildMonthHTML(+sec.dataset.y, +sec.dataset.m);
      });
    }

    function getContainer() { return document.querySelector('.cal-container'); }
    function getApp()       { return document.querySelector('.app'); }

    function appendNextMonth() {
      const sections = getContainer().querySelectorAll('.month-section');
      const last = sections[sections.length - 1];
      const { y, m } = nextMo(+last.dataset.y, +last.dataset.m);
      getContainer().insertBefore(createMonthSection(y, m), bottomSentinel);
    }

    function prependPrevMonth() {
      const first = getContainer().querySelector('.month-section');
      const { y, m } = prevMo(+first.dataset.y, +first.dataset.m);
      const app = getApp();
      const prevST = app.scrollTop;
      const prevH  = getContainer().scrollHeight;
      getContainer().insertBefore(createMonthSection(y, m), first);
      app.scrollTop = prevST + (getContainer().scrollHeight - prevH);
    }

    function stickyOffset() {
      return document.querySelector('.topbar').offsetHeight +
             document.querySelector('.day-headers').offsetHeight;
    }

    function scrollSecToTop(sec, behavior) {
      getApp().scrollTo({ top: sec.offsetTop - stickyOffset(), behavior });
    }

    // Append months below `y/m` until scrollTop can actually reach sec.offsetTop - stickyOffset()
    function ensureHeadroom(y, m) {
      const app = getApp();
      const sec = document.getElementById(`month-${y}-${m}`);
      if (!sec) return;
      let guard = 0;
      while (sec.offsetTop - stickyOffset() + app.clientHeight > app.scrollHeight && guard++ < 8) {
        appendNextMonth();
      }
    }

    function scrollToMonth(y, m) {
      if (!document.getElementById(`month-${y}-${m}`)) {
        initScroll(y, m); return;
      }
      ensureHeadroom(y, m);
      scrollSecToTop(document.getElementById(`month-${y}-${m}`), 'smooth');
    }

    function initScroll(y, m) {
      if (loadObserver) loadObserver.disconnect();

      const container = getContainer();
      container.querySelectorAll('.month-section').forEach(s => s.remove());
      const pm = prevMo(y, m), nm = nextMo(y, m);
      [pm, { y, m }, nm].forEach(({ y: ry, m: rm }) =>
        container.insertBefore(createMonthSection(ry, rm), bottomSentinel)
      );
      viewYear = y; viewMonth = m;
      document.getElementById('monthLabel').textContent = `${MONTHS[m]} ${y}`;

      ensureHeadroom(y, m);
      const sec = document.getElementById(`month-${y}-${m}`);
      if (sec) scrollSecToTop(sec, 'instant');

      requestAnimationFrame(() => {
        if (loadObserver) {
          loadObserver.observe(topSentinel);
          loadObserver.observe(bottomSentinel);
        }
      });
    }

    function setupObservers() {
      const app = getApp();
      const container = getContainer();

      topSentinel = document.createElement('div');
      topSentinel.className = 'scroll-sentinel';
      bottomSentinel = document.createElement('div');
      bottomSentinel.className = 'scroll-sentinel';
      container.prepend(topSentinel);
      container.append(bottomSentinel);

      loadObserver = new IntersectionObserver(entries => {
        for (const entry of entries) {
          if (!entry.isIntersecting) continue;
          if (entry.target === topSentinel)    prependPrevMonth();
          if (entry.target === bottomSentinel) appendNextMonth();
        }
      }, { root: app, rootMargin: '300px' });
      loadObserver.observe(topSentinel);
      loadObserver.observe(bottomSentinel);

      headingObserver = new IntersectionObserver(entries => {
        for (const entry of entries) {
          if (entry.isIntersecting) {
            const sec = entry.target.closest('.month-section');
            if (sec) {
              viewYear  = +sec.dataset.y;
              viewMonth = +sec.dataset.m;
              document.getElementById('monthLabel').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
            }
            break;
          }
        }
      }, { root: app, rootMargin: `-${56 + 30}px 0px -55% 0px` });
    }

    function renderDayCell(date, ry, rm) {
      const d = date.getDate(), m = date.getMonth(), y = date.getFullYear();
      const inMonth = m === rm && y === ry;
      const isToday = y === today.getFullYear() && m === today.getMonth() && d === today.getDate();

      let cls = 'day-cell';
      if (isToday)  cls += ' today';
      if (!inMonth) cls += ' out-of-month';

      const dateInner = d;
      let html = `<div class="${cls}"><div class="cell-date">${dateInner}</div>`;
      if (inMonth) for (const person of staff) html += personRowHtml(y, m, d, person);
      return html + '</div>';
    }

    function renderWeekendCell(sat, sun, ry, rm) {
      const sd = sat.getDate(), sm = sat.getMonth(), sy = sat.getFullYear();
      const ud = sun.getDate(), um = sun.getMonth(), uy = sun.getFullYear();
      const satIn = sm === rm && sy === ry;
      const sunIn = um === rm && uy === ry;
      const isToday = (sy === today.getFullYear() && sm === today.getMonth() && sd === today.getDate())
                   || (uy === today.getFullYear() && um === today.getMonth() && ud === today.getDate());

      // Use whichever day is in-month as the data day (Saturday takes priority)
      const [y, m, d] = satIn ? [sy, sm, sd] : [uy, um, ud];
      const inMonth = satIn || sunIn;

      let cls = 'day-cell weekend';
      if (!inMonth) cls += ' out-of-month';
      if (isToday)  cls += ' today';

      const dateStr = satIn && sunIn ? `${sd} / ${ud}` : satIn ? `${sd}` : `${ud}`;
      const wk = weekKey(sat);
      const selectedBackup = backup[wk] || '';
      const staffOptions = `<option value=""></option>` +
        staff.map(p => `<option value="${esc(p)}"${selectedBackup === p ? ' selected' : ''}>${esc(shortName(p))}</option>`).join('');
      const backupSelect = inMonth
        ? `<select class="backup-select" data-wk="${esc(wk)}">${staffOptions}</select>`
        : '';

      const bariStaff = staff.filter(p => bariatric[p]);
      const selectedBari = bariCall[wk] || '';
      const bariOptions = `<option value=""></option>` +
        bariStaff.map(p => `<option value="${esc(p)}"${selectedBari === p ? ' selected' : ''}>${esc(shortName(p))}</option>`).join('');
      const bariSelect = inMonth && bariStaff.length
        ? `<select class="backup-select bari-call-select" data-wk="${esc(wk)}" title="Bariatric call">${bariOptions}</select>`
        : '';

      const dateSelects = backupSelect || bariSelect
        ? `<span class="wk-selects">${backupSelect}${bariSelect}</span>`
        : '';

      let html = `<div class="${cls}"><div class="cell-date"><span>${dateStr}</span>${dateSelects}</div>`;
      if (inMonth) for (const person of staff) html += personRowHtml(y, m, d, person);
      return html + '</div>';
    }

    function personRowHtml(y, m, d, person) {
      const { am, pm, oncall_am, oncall_pm, exception } = getCell(y, m, d, person);
      const nm = esc(shortName(person));
      if (am === 'CLOSED') {
        return `<div class="closed-row" data-y="${y}" data-m="${m}" data-d="${d}" data-person="${esc(person)}">
          <span class="pname-closed">${nm}</span><span class="closed-label">CLOSED</span>
        </div>`;
      }
      const amTxt = abbr(am), pmTxt = abbr(pm);
      const amCls = 'am-val' + (amTxt ? '' : ' empty') + (oncall_am !== 'none' ? ` oncall-${oncall_am}` : '') + (am === 'hosp' ? ' hosp' : '') + (exception ? ' exception' : '');
      const pmCls = 'pm-val' + (pmTxt ? '' : ' empty') + (oncall_pm !== 'none' ? ` oncall-${oncall_pm}` : '') + (pm === 'hosp' ? ' hosp' : '');
      return `<div class="person-row" data-y="${y}" data-m="${m}" data-d="${d}" data-person="${esc(person)}">
        <span class="pname">${nm}</span>
        <span class="slots">
          <span class="${amCls}">${amTxt ? esc(amTxt) : '—'}</span>
          <span class="slot-sep"></span>
          <span class="${pmCls}">${pmTxt ? esc(pmTxt) : '—'}</span>
        </span>
      </div>`;
    }

    // ─────────────────────────────────────────────
    //  Edit modal
    // ─────────────────────────────────────────────
    let editState = { am: '', pm: '', oncall_am: 'none', oncall_pm: 'none', exception: false };

    const ONCALL_VALS  = ['none', 'single', 'double'];
    const ONCALL_LABEL = { none: '<u>N</u>o call', single: '<u>S</u>ingle', double: '<u>D</u>ouble' };
    const ASSIGN_LABEL = { '': '— none —', unavailable: 'unavail' };

    function renderChoiceGrid() {
      const dow = editing && new Date(editing.y, editing.m, editing.d).getDay();
      const isWeekend = dow === 6 || dow === 0;
      const colA = isWeekend ? 'Sat' : 'AM';
      const colB = isWeekend ? 'Sun' : 'PM';
      const dis  = isWeekend ? ' cg-disabled' : '';

      // Left column: assignment choices
      let assignHtml = `<div class="cg-grid">
        <div></div>
        <div class="cg-col-hdr">${colA}</div>
        <div class="cg-col-hdr">${colB}</div>`;

      for (const val of ASSIGNMENTS) {
        assignHtml += `<div class="cg-label${dis}">${labelHtml(val)}</div>
          <button class="cg-btn asgn-am${editState.am === val ? ' active' : ''}${dis}" data-val="${esc(val)}"></button>
          <button class="cg-btn asgn-pm${editState.pm === val ? ' active' : ''}${dis}" data-val="${esc(val)}"></button>`;
      }
      assignHtml += '</div>';

      // Right column: on-call + action buttons
      let oncallHtml = `<div class="cg-grid cg-oncall">
        <div></div>
        <div class="cg-col-hdr">${colA}</div>
        <div class="cg-col-hdr">${colB}</div>`;

      for (const val of ONCALL_VALS) {
        oncallHtml += `<div class="cg-label">${ONCALL_LABEL[val]}</div>
          <button class="cg-btn oncall-am${editState.oncall_am === val ? ' active' : ''} ${val !== 'none' ? val : ''}" data-val="${val}"></button>
          <button class="cg-btn oncall-pm${editState.oncall_pm === val ? ' active' : ''} ${val !== 'none' ? val : ''}" data-val="${val}"></button>`;
      }
      oncallHtml += `<div class="cg-divider"></div>
        <div class="cg-label"><u>E</u>xception</div>
        <button class="cg-btn exception-am${editState.exception ? ' active exception' : ''}"></button>
        <button class="cg-btn cg-disabled"></button>`;
      oncallHtml += '</div>';

      const actionsHtml = `<div class="action-grid">
        <button class="btn btn-cancel  edit-cancel">Cancel</button>
        <button class="btn btn-save    edit-save">Save</button>
        <button class="btn btn-advance edit-advance">Save &#8594;</button>
      </div>`;

      const html = `<div class="edit-layout">
        <div class="assign-col">${assignHtml}</div>
        <div class="right-col">${oncallHtml}${actionsHtml}</div>
      </div>`;

      const grid = document.getElementById('choiceGrid');
      grid.innerHTML = html;

      grid.querySelectorAll('.asgn-am').forEach(btn =>
        btn.addEventListener('click', () => {
          if (btn.dataset.val === 'CLOSED' && editing) {
            const { y, m, d } = editing;
            for (const p of staff) {
              setCell(y, m, d, p, { am: 'CLOSED', pm: '', oncall_am: 'none', oncall_pm: 'none' });
            }
            closeEdit(); reRenderMonth(y, m); return;
          }
          editState.am = editState.pm = btn.dataset.val;
          renderChoiceGrid();
        }));

      grid.querySelectorAll('.asgn-pm').forEach(btn =>
        btn.addEventListener('click', () => { editState.pm = btn.dataset.val; renderChoiceGrid(); }));

      grid.querySelectorAll('.oncall-am').forEach(btn =>
        btn.addEventListener('click', () => {
          editState.oncall_am = editState.oncall_pm = btn.dataset.val; renderChoiceGrid();
        }));

      grid.querySelectorAll('.oncall-pm').forEach(btn =>
        btn.addEventListener('click', () => { editState.oncall_pm = btn.dataset.val; renderChoiceGrid(); }));

      grid.querySelector('.exception-am').addEventListener('click', () => {
        editState.exception = !editState.exception; renderChoiceGrid();
      });

      grid.querySelector('.edit-save').addEventListener('click', () => {
        if (doSave() !== false) {
          const { y, m } = editing;
          closeEdit();
          reRenderMonth(y, m);
        }
      });
      grid.querySelector('.edit-advance').addEventListener('click', saveAndAdvance);
      grid.querySelector('.edit-cancel').addEventListener('click',  closeEdit);
    }

    function setEditHighlight(y, m, d, person) {
      document.querySelectorAll('.editing-highlight').forEach(el => el.classList.remove('editing-highlight'));
      if (y == null) return;
      document.querySelectorAll(`[data-y="${y}"][data-m="${m}"][data-d="${d}"]`).forEach(el => {
        if (el.dataset.person === person) el.classList.add('editing-highlight');
      });
    }

    function openEdit(y, m, d, person) {
      editing = { y, m, d, person };
      const cell = getCell(y, m, d, person);
      const dow  = DAYS[new Date(y, m, d).getDay()];

      document.getElementById('editTitle').textContent =
        `${person} — ${dow} ${MONTHS[m]} ${d}`;

      editState = { am: cell.am, pm: cell.pm, oncall_am: cell.oncall_am, oncall_pm: cell.oncall_pm, exception: cell.exception };
      document.getElementById('editClearBtn').onclick = () => {
        clearCell(y, m, d, person); closeEdit(); reRenderMonth(y, m);
      };
      renderChoiceGrid();
      setEditHighlight(y, m, d, person);
      document.getElementById('editOverlay').classList.add('open');
    }

    function closeEdit() {
      document.getElementById('editOverlay').classList.remove('open');
      setEditHighlight(null);
      editing = null;
    }

    const KEY_SHORTCUTS = { o: 'ov', h: 'hosp', c: 'C-surg', f: 'F-surg', a: 'admin', u: 'unavailable' };

    // Returns display label with the shortcut letter underlined
    function labelHtml(val) {
      const raw = ASSIGN_LABEL[val] ?? val;
      const key = Object.keys(KEY_SHORTCUTS).find(k => KEY_SHORTCUTS[k] === val);
      if (!key) return esc(raw);
      const idx = raw.toLowerCase().indexOf(key.toLowerCase());
      if (idx === -1) return esc(raw);
      return esc(raw.slice(0, idx)) + '<u>' + esc(raw[idx]) + '</u>' + esc(raw.slice(idx + 1));
    }

    function doSave() {
      if (!editing) return true;
      const { y, m, d, person } = editing;
      const { am, pm, oncall_am, oncall_pm, exception } = editState;

      // Validate on-call conflicts
      const conflicts = [];
      for (const p of staff) {
        if (p === person) continue;
        const c = getCell(y, m, d, p);
        if (oncall_am !== 'none' && c.oncall_am !== 'none') conflicts.push({ p, col: 'AM' });
        if (oncall_pm !== 'none' && c.oncall_pm !== 'none') conflicts.push({ p, col: 'PM' });
      }
      if (conflicts.length) {
        const names = conflicts.map(c => `${c.p} (${c.col})`).join(', ');
        const ok = confirm(
          `On-call conflict with: ${names}.\n\nAccept to reassign call to ${person} and clear the conflict, or Cancel to go back.`
        );
        if (!ok) return false;
        for (const { p, col } of conflicts) {
          const c = getCell(y, m, d, p);
          setCell(y, m, d, p, { ...c, [col === 'AM' ? 'oncall_am' : 'oncall_pm']: 'none' });
        }
      }

      // Validate hosp conflicts
      const hospConflicts = [];
      for (const p of staff) {
        if (p === person) continue;
        const c = getCell(y, m, d, p);
        if (am === 'hosp' && c.am === 'hosp') hospConflicts.push({ p, col: 'AM' });
        if (pm === 'hosp' && c.pm === 'hosp') hospConflicts.push({ p, col: 'PM' });
      }
      if (hospConflicts.length) {
        const names = hospConflicts.map(c => `${c.p} (${c.col})`).join(', ');
        const ok = confirm(
          `Hosp conflict with: ${names}.\n\nAccept to reassign hosp to ${person} and clear the conflict, or Cancel to go back.`
        );
        if (!ok) return false;
        for (const { p, col } of hospConflicts) {
          const c = getCell(y, m, d, p);
          setCell(y, m, d, p, { ...c, [col === 'AM' ? 'am' : 'pm']: '' });
        }
      }

      setCell(y, m, d, person, { am, pm, oncall_am, oncall_pm, exception });
      if (new Date(y, m, d).getDay() === 5) {
        const sat = new Date(y, m, d + 1);
        setCell(sat.getFullYear(), sat.getMonth(), sat.getDate(), person,
          { ...getCell(sat.getFullYear(), sat.getMonth(), sat.getDate(), person), oncall_am, oncall_pm });
      }
      updateDaySummary();
      return true;
    }

    function saveAndAdvance() {
      if (!editing) return;
      if (doSave() === false) return;
      const { y, m, d, person } = editing;
      reRenderMonth(y, m);
      const dow  = new Date(y, m, d).getDay();
      const next = dow === 5 ? new Date(y, m, d + 1)
                 : dow === 6 ? new Date(y, m, d + 2)
                 :              new Date(y, m, d + 1);
      const ny = next.getFullYear(), nm = next.getMonth(), nd = next.getDate();
      if (nm !== m || ny !== y) scrollToMonth(ny, nm);
      else if (!document.getElementById(`month-${ny}-${nm}`)) appendNextMonth();
      openEdit(ny, nm, nd, person);
    }

    function saveAndRetreat() {
      if (!editing) return;
      if (doSave() === false) return;
      const { y, m, d, person } = editing;
      reRenderMonth(y, m);
      const dow  = new Date(y, m, d).getDay();
      const prev = dow === 1 ? new Date(y, m, d - 2)   // Mon → skip back to Sat
                 : dow === 0 ? new Date(y, m, d - 1)   // Sun → Sat
                 :              new Date(y, m, d - 1);
      const py = prev.getFullYear(), pm2 = prev.getMonth(), pd = prev.getDate();
      if (pm2 !== m || py !== y) scrollToMonth(py, pm2);
      else if (!document.getElementById(`month-${py}-${pm2}`)) appendNextMonth();
      openEdit(py, pm2, pd, person);
    }

    document.getElementById('editOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('editOverlay')) closeEdit();
    });

    document.addEventListener('keydown', e => {
      if (!document.getElementById('editOverlay').classList.contains('open')) return;
      if (e.key === 'Tab' && !e.shiftKey)  { e.preventDefault(); saveAndAdvance(); return; }
      if (e.key === 'Tab' &&  e.shiftKey)  { e.preventDefault(); saveAndRetreat(); return; }
      if (e.key === 'Enter')  { if (doSave() !== false) { const {y,m} = editing; closeEdit(); reRenderMonth(y, m); } return; }
      if (e.key === 'Escape') { closeEdit(); return; }

      const key = e.key.toLowerCase();
      if (KEY_SHORTCUTS[key]) {
        editState.am = editState.pm = KEY_SHORTCUTS[key];
        renderChoiceGrid();
        return;
      }
      // 'b' cycles ba-C → ba-F → ba-C
      if (key === 'b') {
        editState.am = editState.pm = editState.am === 'ba-C' ? 'ba-F' : 'ba-C';
        renderChoiceGrid(); return;
      }
      if (key === 'n') {
        editState.oncall_am = editState.oncall_pm = 'none';
        renderChoiceGrid(); return;
      }
      if (key === 'e') {
        editState.exception = !editState.exception;
        renderChoiceGrid(); return;
      }
      if (key === 's') {
        editState.oncall_am = editState.oncall_pm = 'single';
        renderChoiceGrid(); return;
      }
      if (key === 'd') {
        editState.oncall_am = editState.oncall_pm = 'double';
        renderChoiceGrid(); return;
      }
    });

    // ─────────────────────────────────────────────
    //  Settings
    // ─────────────────────────────────────────────
    function openSettings() {
      renderStaffList();
      document.getElementById('settingsOverlay').classList.add('open');
    }

    function closeSettings() {
      syncStaffFromDOM();
      staff = staff.filter(Boolean);
      if (!staff.length) staff = ['Person 1'];
      saveStaff();
      saveBariatric();
      document.getElementById('settingsOverlay').classList.remove('open');
      render();
    }

    function renderStaffList() {
      const list = document.getElementById('staffList');
      list.innerHTML = staff.map((name, i) => `
        <div class="staff-item" draggable="true" data-idx="${i}">
          <span class="drag-handle">&#8942;</span>
          <input type="text" value="${esc(name)}" placeholder="Name">
          <label class="bariatric-label">
            <input type="checkbox" class="bari-check" data-idx="${i}"${bariatric[name] ? ' checked' : ''}>
            Bari
          </label>
          <button class="remove-btn" data-idx="${i}" aria-label="Remove">&#x2715;</button>
        </div>
      `).join('');

      // Bariatric checkbox toggles
      list.querySelectorAll('.bari-check').forEach(cb => {
        cb.addEventListener('change', () => {
          const item = cb.closest('.staff-item');
          const name = item.querySelector('input[type="text"]').value.trim();
          if (name) { bariatric[name] = cb.checked; saveBariatric(); }
        });
      });

      list.querySelectorAll('.remove-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          syncStaffFromDOM();
          const removed = staff.splice(parseInt(btn.dataset.idx), 1)[0];
          delete bariatric[removed];
          saveBariatric();
          if (!staff.length) staff = [''];
          renderStaffList();
        });
      });

      let dragSrc = null;
      list.querySelectorAll('.staff-item').forEach(item => {
        item.addEventListener('dragstart', e => {
          dragSrc = item;
          e.dataTransfer.effectAllowed = 'move';
        });
        item.addEventListener('dragover', e => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          list.querySelectorAll('.staff-item').forEach(el => el.classList.remove('drag-over'));
          if (item !== dragSrc) item.classList.add('drag-over');
        });
        item.addEventListener('dragleave', () => item.classList.remove('drag-over'));
        item.addEventListener('drop', e => {
          e.preventDefault();
          item.classList.remove('drag-over');
          if (!dragSrc || dragSrc === item) return;
          syncStaffFromDOM();
          const from = parseInt(dragSrc.dataset.idx);
          const to   = parseInt(item.dataset.idx);
          staff.splice(to, 0, staff.splice(from, 1)[0]);
          renderStaffList();
        });
      });
    }

    function syncStaffFromDOM() {
      const inputs = document.querySelectorAll('#staffList .staff-item input[type="text"]');
      staff = Array.from(inputs).map(i => i.value.trim());
    }

    document.getElementById('addStaffBtn').addEventListener('click', () => {
      syncStaffFromDOM();
      staff = staff.filter(Boolean);
      staff.push('');
      renderStaffList();
      setTimeout(() => {
        const all = document.querySelectorAll('#staffList .staff-item input');
        if (all.length) all[all.length - 1].focus();
      }, 40);
    });

    document.getElementById('settingsDone').addEventListener('click', closeSettings);
    document.getElementById('settingsBtn').addEventListener('click', openSettings);

    // ─────────────────────────────────────────────
    //  Totals panel
    // ─────────────────────────────────────────────
    function openTotals() {
      closeSettings();
      const y = viewYear, m = viewMonth;
      const days = new Date(y, m + 1, 0).getDate();

      // Count on-call days per person
      const rows = staff.map(person => {
        let frye = 0, cmvc = 0;
        for (let d = 1; d <= days; d++) {
          const c = getCell(y, m, d, person);
          const hasAny = c.oncall_am !== 'none' || c.oncall_pm !== 'none';
          const hasDbl = c.oncall_am === 'double' || c.oncall_pm === 'double';
          if (hasAny) frye++;
          if (hasDbl) cmvc++;
        }
        return { person, frye, cmvc };
      });

      const totalFrye = rows.reduce((s, r) => s + r.frye, 0);
      const totalCmvc = rows.reduce((s, r) => s + r.cmvc, 0);

      document.getElementById('totalsTitle').textContent = `Totals — ${MONTHS[m]} ${y}`;

      const rowsHtml = rows.map(r => `
        <tr>
          <td>${esc(r.person)}</td>
          <td class="totals-frye">${r.frye || '—'}</td>
          <td class="totals-cmvc">${r.cmvc || '—'}</td>
        </tr>`).join('');

      document.getElementById('totalsTable').innerHTML = `
        <table class="totals-table">
          <thead>
            <tr>
              <th>Staff</th>
              <th class="totals-frye">Frye</th>
              <th class="totals-cmvc">CMVC</th>
            </tr>
          </thead>
          <tbody>
            ${rowsHtml}
            <tr class="total-row">
              <td>Total</td>
              <td class="totals-frye">${totalFrye || '—'}</td>
              <td class="totals-cmvc">${totalCmvc || '—'}</td>
            </tr>
          </tbody>
        </table>`;

      document.getElementById('totalsOverlay').classList.add('open');
    }

    function closeTotals() {
      document.getElementById('totalsOverlay').classList.remove('open');
    }

    document.getElementById('totalsBtn').addEventListener('click', openTotals);
    document.getElementById('totalsDismiss').addEventListener('click', closeTotals);
    document.getElementById('totalsOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('totalsOverlay')) closeTotals();
    });
    document.getElementById('settingsOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('settingsOverlay')) closeSettings();
    });

    // ─────────────────────────────────────────────
    //  Export / Import / Clear
    // ─────────────────────────────────────────────
    document.getElementById('exportBtn').addEventListener('click', () => {
      const blob = new Blob(
        [JSON.stringify({ staff, data }, null, 2)],
        { type: 'application/json' }
      );
      Object.assign(document.createElement('a'), {
        href: URL.createObjectURL(blob),
        download: `call-calendar-${viewYear}-${viewMonth + 1}.json`
      }).click();
    });

    document.getElementById('importBtn').addEventListener('click', () => {
      document.getElementById('importFile').click();
    });

    document.getElementById('importFile').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const imported = JSON.parse(ev.target.result);
          if (imported.data && typeof imported.data === 'object') { data = imported.data; saveData(); }
          if (Array.isArray(imported.staff) && imported.staff.length) { staff = imported.staff; saveStaff(); }
          closeSettings();
          render();
          alert('Data imported successfully.');
        } catch {
          alert('Could not read file. Make sure it is a valid JSON export from this app.');
        }
      };
      reader.readAsText(file);
      e.target.value = '';
    });

    document.getElementById('clearMonthBtn').addEventListener('click', () => {
      if (!confirm(`Clear all data for ${MONTHS[viewMonth]} ${viewYear}?`)) return;
      const days = new Date(viewYear, viewMonth + 1, 0).getDate();
      for (let d = 1; d <= days; d++)
        for (const p of staff) clearCell(viewYear, viewMonth, d, p);
      closeSettings();
      render();
    });

    document.getElementById('clearAllBtn').addEventListener('click', () => {
      if (!confirm('Clear ALL calendar data? This cannot be undone.')) return;
      data = {};
      saveData();
      closeSettings();
      render();
    });

    // ─────────────────────────────────────────────
    //  Navigation
    // ─────────────────────────────────────────────
    document.getElementById('prevMonth').addEventListener('click', () => {
      const { y, m } = prevMo(viewYear, viewMonth);
      scrollToMonth(y, m);
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      const { y, m } = nextMo(viewYear, viewMonth);
      scrollToMonth(y, m);
    });

    document.getElementById('todayBtn').addEventListener('click', () => {
      scrollToMonth(today.getFullYear(), today.getMonth());
    });

    // ─────────────────────────────────────────────
    //  Draggable edit panel
    // ─────────────────────────────────────────────
    function setupDraggableSheet() {
      const overlay = document.getElementById('editOverlay');
      const sheet   = overlay.querySelector('.sheet');
      const handle  = sheet.querySelector('.sheet-handle');
      let dragging = false, startX, startY, startLeft, startTop;

      function beginDrag(cx, cy) {
        const r = sheet.getBoundingClientRect();
        startX = cx; startY = cy;
        startLeft = r.left; startTop = r.top;
        sheet.style.cssText += `;position:fixed;left:${r.left}px;top:${r.top}px;bottom:auto;width:${r.width}px;border-radius:16px;margin:0;max-height:90vh`;
        dragging = true;
      }
      function moveDrag(cx, cy) {
        if (!dragging) return;
        const left = Math.max(0, Math.min(startLeft + cx - startX, window.innerWidth  - sheet.offsetWidth));
        const top  = Math.max(0, Math.min(startTop  + cy - startY, window.innerHeight - sheet.offsetHeight));
        sheet.style.left = left + 'px';
        sheet.style.top  = top  + 'px';
      }
      function endDrag() { dragging = false; }

      handle.addEventListener('mousedown',  e => { beginDrag(e.clientX, e.clientY); e.preventDefault(); });
      document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
      document.addEventListener('mouseup',   endDrag);
      handle.addEventListener('touchstart', e => { beginDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, { passive: false });
      document.addEventListener('touchmove', e => { if (dragging) { moveDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); } }, { passive: false });
      document.addEventListener('touchend', endDrag);

      // Reset to bottom-sheet only when transitioning from closed → open
      let wasOpen = overlay.classList.contains('open');
      new MutationObserver(() => {
        const isOpen = overlay.classList.contains('open');
        if (isOpen && !wasOpen) {
          sheet.style.position = '';
          sheet.style.left = ''; sheet.style.top = ''; sheet.style.bottom = '';
          sheet.style.width = ''; sheet.style.borderRadius = ''; sheet.style.margin = '';
        }
        wasOpen = isOpen;
      }).observe(overlay, { attributes: true, attributeFilter: ['class'] });
    }

    // ─────────────────────────────────────────────
    //  Boot
    // ─────────────────────────────────────────────
    // ─────────────────────────────────────────────
    //  Day summary (topbar)
    // ─────────────────────────────────────────────
    function updateDaySummary() {
      const [ty, tm, td] = todayDataDate();
      const wk = todayWeekKey();

      // On call: first person with any oncall set
      const callPerson = staff.find(p => {
        const c = getCell(ty, tm, td, p);
        return c.oncall_am !== 'none' || c.oncall_pm !== 'none';
      }) || '';

      // Backup: first person with hosp in AM or PM
      const backupPerson = staff.find(p => {
        const c = getCell(ty, tm, td, p);
        return c.am === 'hosp' || c.pm === 'hosp';
      }) || '';

      // Bariatric call: bariCall dropdown for this week
      const bariPerson = bariCall[wk] || '';

      function set(id, name) {
        const el = document.getElementById(id);
        el.textContent = name ? shortName(name) : '—';
        el.className = 'ds-value' + (name ? '' : ' empty');
      }
      set('ds-call',   callPerson);
      set('ds-backup', backupPerson);
      set('ds-bari',   bariPerson);
    }

    setupObservers();
    initScroll(viewYear, viewMonth);
    setupDraggableSheet();
    updateDaySummary();

    // Portrait nudge dismiss
    document.getElementById('rotateNudgeDismiss').addEventListener('click', () => {
      document.getElementById('rotateNudge').style.display = 'none';
    });
  </script>
</body>
</html>
