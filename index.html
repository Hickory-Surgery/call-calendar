  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --topbar-h: 56px;
      --oncall-single: #FFF176;
      --oncall-double: #FFB74D;
      --oncall-exception: #A5D6A7;
      --border: #D0D7DE;
      --header-bg: #03080a;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --col: repeat(6, minmax(0, 1fr));
    }

    body {
      font-family: var(--font);
      background: #F0F2F5;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 900px;
      max-width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      position: relative;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      background: var(--header-bg);
      color: white;
      flex-shrink: 0;
      gap: 8px;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .month-nav {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .month-nav button {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: white;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .month-nav button:hover {
      background: rgba(255, 255, 255, 0.28);
    }

    .month-label {
      font-size: 1rem;
      font-weight: 600;
      min-width: 148px;
      text-align: center;
    }

    .topbar-actions {
      display: flex;
      gap: 6px;
    }

    .icon-btn {
      background: rgba(255, 255, 255, 0.15);
      border: none;
      color: white;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, 0.28);
    }

    /* ── Day-of-week header ── */
    .day-headers {
      display: grid;
      grid-template-columns: var(--col);
      background: var(--header-bg);
      position: sticky;
      top: var(--topbar-h);
      z-index: 10;
      flex-shrink: 0;
    }

    .day-headers>div {
      padding: 5px 4px;
      text-align: center;
      font-size: 0.72rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.9);
      border-right: 1px solid rgba(255, 255, 255, 0.1);
    }

    .day-headers>div:last-child {
      border-right: none;
    }

    .day-headers .weekend {
      color: rgba(255, 255, 255, 0.6);
    }

    /* ── Calendar grid ── */
    .cal-grid {
      display: grid;
      grid-template-columns: var(--col);
      gap: 1px;
      background: var(--border);
    }

    /* ── Day cell ── */
    .day-cell {
      background: white;
      padding: 4px 3px 5px;
      min-height: 0;
    }

    .day-cell.weekend {
      background: #F8F9FA;
    }

    .day-cell.out-of-month {
      background: #ECEEF1;
    }

    /* Date number — spans full cell width, colored when on-call */
    .cell-date {
      font-size: 0.72rem;
      font-weight: 700;
      color: #546E7A;
      /* bleed to edges of the padded cell */
      margin: -4px -3px 3px -3px;
      padding: 3px 5px;
      line-height: 1.4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 4px;
    }

    .wk-selects {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex-shrink: 0;
    }

    .backup-select {
      font-size: 0.6rem;
      font-weight: 600;
      color: #37474F;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(0, 0, 0, 0.15);
      border-radius: 3px;
      padding: 1px 2px;
      cursor: pointer;
      max-width: 52px;
      width: 52px;
    }

    .backup-select:focus {
      outline: none;
      border-color: #1565C0;
    }

    .bari-call-select {
      background: #CFD8DC;
      border-color: rgba(0, 0, 0, 0.12);
      color: #37474F;
    }

    /* ── Topbar day-summary ── */
    .day-summary {
      display: flex;
      align-items: center;
      gap: 26px;
    }

    .ds-call-group {
      display: flex;
      align-items: baseline;
      gap: 5px;
    }

    .ds-call-group .ds-label {
      font-size: 0.68rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.75);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .ds-call-group .ds-value {
      font-size: 0.9rem;
      font-weight: 700;
      color: white;
      white-space: nowrap;
    }

    .ds-stack {
      display: grid;
      grid-template-columns: auto auto;
      column-gap: 4px;
      row-gap: 1px;
      align-items: baseline;
    }

    .ds-row {
      display: contents;
    }

    .ds-row .ds-label {
      font-size: 0.6rem;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.55);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .ds-row .ds-value {
      font-size: 0.68rem;
      font-weight: 600;
      color: white;
      white-space: nowrap;
    }

    .day-summary .ds-value.empty {
      color: rgba(255, 255, 255, 0.3);
    }

    #ds-backup, #ds-bari {
      padding-left: 4px;
    }

    .cell-date {
      background: #CFD8DC;
      color: #37474F;
    }

    .today .cell-date {
      background: #1565C0;
      color: white;
    }

    .today .cell-date .backup-select {
      background: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.3);
      color: white;
    }

    .out-of-month .cell-date {
      color: #AABBCC;
    }


    /* ── Person row ── */
    .person-row {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 2px 3px;
      border-radius: 3px;
      margin-bottom: 2px;
      cursor: pointer;
      min-height: 20px;
      transition: filter 0.08s;
      overflow: hidden;
    }

    .person-row:hover {
      filter: brightness(0.89);
    }

    .person-row:active {
      filter: brightness(0.8);
    }

    .person-row {
      background: transparent;
    }

    .editing-highlight {
      outline: 2px solid #1565C0;
      outline-offset: 1px;
      border-radius: 3px;
    }

    .drag-source {
      opacity: 0.4;
    }

    .drag-over {
      outline: 2px solid #FFA000;
      outline-offset: 1px;
      border-radius: 3px;
      background: rgba(255, 160, 0, 0.08);
    }

    .am-val.oncall-single,
    .pm-val.oncall-single {
      background: var(--oncall-single);
      border: 1px solid #F9A825;
      padding: 1px 3px;
    }

    .am-val.oncall-double,
    .pm-val.oncall-double {
      background: var(--oncall-double);
      border: 1px solid #E65100;
      padding: 1px 3px;
    }

    .am-val.exception {
      background: var(--oncall-exception);
      border: 1px solid #388E3C;
      padding: 1px 3px;
    }

    .am-val.oncall-single,
    .am-val.oncall-double,
    .am-val.exception {
      border-radius: 2px 0 0 2px;
      border-right: none;
    }

    .pm-val.oncall-single,
    .pm-val.oncall-double {
      border-radius: 0 2px 2px 0;
      border-left: none;
    }

    /* Person name */
    .pname {
      font-size: 0.58rem;
      font-weight: 700;
      color: #37474F;
      min-width: 26px;
      max-width: 26px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* AM / PM slots */
    .slots {
      display: flex;
      align-items: center;
      gap: 0;
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }

    .am-val,
    .pm-val {
      font-size: 0.68rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      min-width: 0;
      text-align: center;
    }

    .am-val {
      color: #1A237E;
    }

    .pm-val {
      color: #4A148C;
    }

    .am-val.empty,
    .pm-val.empty {
      color: #B0BEC5;
    }

    .am-val.hosp,
    .pm-val.hosp {
      font-weight: 700;
    }

    .slot-sep {
      display: none;
      flex-shrink: 0;
      padding: 0 1px;
    }

    /* CLOSED row */
    .closed-row {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2px 3px;
      border-radius: 3px;
      margin-bottom: 2px;
      min-height: 20px;
      background: #CFD8DC;
      cursor: pointer;
      transition: filter 0.08s;
    }

    .closed-row:hover {
      filter: brightness(0.9);
    }

    .closed-row.oncall-single {
      background: var(--oncall-single);
    }

    .closed-row.oncall-double {
      background: var(--oncall-double);
    }

    .closed-row.oncall-exception,
    .closed-row.exception {
      background: var(--oncall-exception);
    }

    .pname-closed {
      font-size: 0.58rem;
      font-weight: 700;
      color: #37474F;
      min-width: 26px;
      flex-shrink: 0;
    }

    .closed-label {
      font-size: 0.55rem;
      font-weight: 800;
      color: #455A64;
      letter-spacing: 0.3px;
      flex: 1;
      text-align: center;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      gap: 14px;
      padding: 5px 14px;
      background: white;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.68rem;
      color: #546E7A;
    }

    .legend-swatch {
      width: 13px;
      height: 13px;
      border-radius: 3px;
      border: 1px solid rgba(0, 0, 0, 0.12);
    }

    /* ── Bottom-sheet base ── */
    /* ── Login screen ── */
    #loginScreen {
      display: flex;
      position: fixed;
      inset: 0;
      background: #37474F;
      z-index: 200;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
    }
    #loginScreen.hidden { display: none; }
    .login-card {
      background: white;
      border-radius: 12px;
      padding: 40px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .login-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: #37474F;
    }
    .login-sub {
      font-size: 0.85rem;
      color: #607D8B;
      text-align: center;
    }
    .btn-google {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      border: 1px solid #D0D7DE;
      border-radius: 6px;
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #37474F;
      cursor: pointer;
    }
    .btn-google:hover { background: #F5F5F5; }
    #loginScreen.checking .login-card { display: none; }
    #loginScreen.checking::after {
      content: '';
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }

    .sheet-overlay.open {
      display: flex;
    }

    .sheet {
      background: white;
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 380px;
      padding: 14px 16px 22px;
      max-height: 88vh;
      overflow-y: auto;
    }

    .sheet-handle {
      width: 56px;
      height: 20px;
      margin: 0 auto 12px;
      cursor: grab;
      background-image: repeating-linear-gradient(to bottom,
          transparent 0px, transparent 3px,
          #C0C8D0 3px, #C0C8D0 5px);
      border-radius: 2px;
      opacity: 0.8;
    }

    .sheet-handle:hover {
      opacity: 1;
    }

    .sheet-handle:active {
      cursor: grabbing;
    }

    .sheet-title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .sheet-title {
      font-size: 1rem;
      font-weight: 700;
      color: #263238;
    }

    .btn-clear-inline {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 3px 9px;
      border: 1.5px solid #FFCDD2;
      border-radius: 6px;
      background: #FFEBEE;
      color: #B71C1C;
      cursor: pointer;
      flex-shrink: 0;
    }

    .btn-clear-inline:hover {
      background: #FFCDD2;
    }

    /* ── Edit panel two-column layout ── */
    .edit-layout {
      display: flex;
      gap: 12px;
      align-items: stretch;
    }

    .assign-col {
      flex: 1;
      min-width: 0;
    }

    .right-col {
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    /* tighter grid for the oncall section */
    .cg-oncall {
      grid-template-columns: max-content 36px 36px;
    }

    .action-grid {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 10px;
      margin-top: auto;
    }

    .action-grid .btn {
      padding: 9px 18px;
      font-size: 0.8rem;
      flex: none;
    }

    /* ── Choice grid (edit modal) ── */
    .cg-grid {
      display: grid;
      grid-template-columns: max-content 42px 42px;
      gap: 3px;
      margin-bottom: 8px;
    }

    .cg-col-hdr {
      text-align: center;
      font-size: 0.68rem;
      font-weight: 700;
      color: #607D8B;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding-bottom: 2px;
    }

    .cg-label {
      font-size: 0.85rem;
      color: #37474F;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 6px 0 0;
      text-align: right;
    }

    .cg-divider {
      grid-column: 1 / -1;
      height: 1px;
      background: #E0E7EF;
      margin: 4px 0;
    }

    .cg-btn {
      height: 30px;
      border: 1.5px solid #D0D7DE;
      border-radius: 5px;
      background: #F5F7F9;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
    }

    .cg-btn:hover {
      filter: brightness(0.94);
    }

    .cg-label.cg-disabled {
      color: #B0BEC5;
    }

    .cg-btn.cg-disabled {
      opacity: 0.25;
      pointer-events: none;
    }

    .cg-btn.active {
      background: #455A64;
      border-color: #263238;
    }

    .cg-btn.active::after {
      content: '✓';
      color: white;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .cg-btn.active.single {
      background: var(--oncall-single);
      border-color: #F9A825;
    }

    .cg-btn.active.single::after {
      color: #4A3000;
    }

    .cg-btn.active.double {
      background: var(--oncall-double);
      border-color: #E65100;
    }

    .cg-btn.active.double::after {
      color: #3E0000;
    }

    .cg-btn.active.exception {
      background: var(--oncall-exception);
      border-color: #388E3C;
    }

    .cg-btn.active.exception::after {
      color: #1B5E20;
    }

    .cg-btn.active.double::after {
      color: #3E0000;
    }

    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }

    .btn-save {
      background: #37474F;
      color: white;
    }

    .btn-save:hover {
      background: #263238;
    }

    .btn-cancel {
      background: #ECEFF1;
      color: #37474F;
    }

    .btn-cancel:hover {
      background: #CFD8DC;
    }

    .btn-clear {
      background: #FFEBEE;
      color: #B71C1C;
      flex: 0 0 auto;
      padding: 12px 16px;
    }

    .btn-clear:hover {
      background: #FFCDD2;
    }

    .btn-advance {
      background: #1565C0;
      color: white;
    }

    .btn-advance:hover {
      background: #0D47A1;
    }

    /* ── Settings ── */
    .section-label {
      font-size: 0.72rem;
      font-weight: 700;
      color: #607D8B;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .staff-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 12px;
    }

    .staff-item {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: default;
    }

    .staff-item.drag-over {
      outline: 2px solid #1565C0;
      border-radius: 6px;
    }

    .drag-handle {
      cursor: grab;
      color: #90A4AE;
      font-size: 1.1rem;
      padding: 0 2px;
      user-select: none;
      flex-shrink: 0;
    }

    .drag-handle:active {
      cursor: grabbing;
    }

    .staff-item input[type="text"] {
      padding: 8px 8px;
      border: 1.5px solid #CFD8DC;
      border-radius: 8px;
      font-size: 0.9rem;
      color: #263238;
      min-width: 0;
    }

    .staff-short {
      flex: 0 0 52px;
    }

    .staff-full {
      flex: 1;
    }

    .staff-item input:focus {
      outline: none;
      border-color: #37474F;
    }

    .bariatric-label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.72rem;
      color: #607D8B;
      white-space: nowrap;
      flex-shrink: 0;
      cursor: pointer;
    }

    .bariatric-label input[type="checkbox"] {
      width: 14px;
      height: 14px;
      margin: 0;
      accent-color: #37474F;
      cursor: pointer;
      flex-shrink: 0;
      border: none;
      padding: 0;
    }

    .remove-btn {
      width: 36px;
      height: 36px;
      border: none;
      background: #FFEBEE;
      color: #B71C1C;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* ── Settings tabs ── */
    .sheet-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 16px;
      border-bottom: 2px solid #ECEFF1;
    }

    .tab-btn {
      padding: 8px 14px;
      border: none;
      background: none;
      color: #90A4AE;
      font-size: 0.82rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: color 0.15s;
    }

    .tab-btn:hover {
      color: #37474F;
    }

    .tab-btn.active {
      color: #1565C0;
      border-bottom-color: #1565C0;
    }

    .tab-panels {
      display: grid;
    }

    .tab-panel {
      grid-area: 1 / 1;
      visibility: hidden;
      pointer-events: none;
    }

    .tab-panel.active {
      visibility: visible;
      pointer-events: auto;
    }

    .remove-btn:disabled {
      background: #F5F5F5;
      color: #CFD8DC;
      cursor: not-allowed;
    }

    .add-btn {
      width: 100%;

              <option value="viewer">Viewer</option>

            </select>

          </div>
        </div>

        <div class="tab-panel" id="tab-data">
          <button class="data-btn" id="totalsBtn"><span style="filter:grayscale(1)">🧮</span> Totals</button>
          <button class="data-btn" id="exportBtn">&#8595; Export data as JSON</button>
          <button class="data-btn admin-only" id="importBtn">&#8593; Import data from JSON</button>
          <button class="data-btn danger admin-only" id="clearMonthBtn">&#x2715; Clear this month's data</button>
          <button class="data-btn danger admin-only" id="clearAllBtn">&#x2715; Clear all data</button>

        <div class="tab-panel" id="tab-account">

  <!-- Totals panel -->
  <div class="sheet-overlay" id="totalsOverlay">
    <div class="sheet">
      <div class="sheet-title-row">
        <div class="sheet-title" id="totalsTitle"></div>
        <button class="btn-clear-inline" id="totalsDismiss"
          style="background:#ECEFF1;border-color:#CFD8DC;color:#37474F;">Close</button>
      </div>
      <div id="totalsTable"></div>
    </div>
  </div>

  <input type="file" id="importFile" accept=".json" style="display:none">

  <script>
    // ─────────────────────────────────────────────
    //  Auth
    // ─────────────────────────────────────────────
    let currentUser = null;
    let currentRole = 'viewer';
    let realtimeChannel = null;
    let sessionApplied = false;
    const canEdit = () => currentRole === 'scheduler' || currentRole === 'admin';
    const isAdmin = () => currentRole === 'admin';

    const loginScreen = document.getElementById('loginScreen');

    document.getElementById('btnGoogleSignIn').addEventListener('click', () => {
      sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + window.location.pathname }
      });
    });

    async function fetchRole(userId) {
      const { data } = await sb.from('profiles').select('role').eq('id', userId).single();
      return data ? data.role : null;
    }

    async function applySession(session) {
      if (sessionApplied) return;
      sessionApplied = true;
      const role = await fetchRole(session.user.id);
      if (!role) {
        await sb.auth.signOut();
        loginScreen.classList.remove('checking');
        loginScreen.querySelector('.login-sub').textContent = 'Access not authorised. Contact an admin.';
        return;
      }
      currentUser = session.user;
      currentRole = role;
      await fetchStaff();
      await Promise.all([fetchAssignments(), fetchBariCall()]);
      setupRealtimeSubscriptions();
      render();
      updateDaySummary();
      loginScreen.classList.add('hidden');
      scrollToMonth(today.getFullYear(), today.getMonth());
    }

    // Initial load: check for a stored session
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session?.user) {
        applySession(session);
      } else {
        loginScreen.classList.remove('checking');
      }
    });

    // Handle sign-in and sign-out during the session
    sb.auth.onAuthStateChange((_event, session) => {
      if (session?.user) {
        applySession(session);
      } else if (currentUser) {
        // Only revert to login if we were previously signed in (genuine sign-out)
        currentUser = null;
        currentRole = 'viewer';
        sessionApplied = false;
        if (realtimeChannel) { sb.removeChannel(realtimeChannel); realtimeChannel = null; }
        loginScreen.classList.remove('hidden');
      }
    });

    // ─────────────────────────────────────────────
    //  Constants
    // ─────────────────────────────────────────────
    const ASSIGNMENTS = ['', 'ov', 'hosp', 'C-surg', 'F-surg', 'ba-C', 'ba-F', 'admin', 'unavailable', 'CLOSED'];
    const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const DAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    // ─────────────────────────────────────────────
    //  State
    // ─────────────────────────────────────────────
    let profileRows = [];

    const today = new Date();

    let viewYear = today.getFullYear();
    let viewMonth = today.getMonth();

    let staff = [];
    let data = {};
    let bariatric = {};
    let bariCall = {};
    let fullnames = {};
    let editing = null;

    let staffRows = [];
    let staffByShortName = {};
    let staffById = {};

    // ─────────────────────────────────────────────
    //  Persistence
    // ─────────────────────────────────────────────
    function displayName(shortKey) {
      return fullnames[shortKey] || shortKey;
    }

    async function fetchStaff() {
      const { data: rows, error } = await sb.from('staff')
        .select('*')
        .eq('active', true)
        .order('sort_order');
      if (error || !rows || !rows.length) return; // keep localStorage fallback
      staffRows = rows;
      staffByShortName = Object.fromEntries(rows.map(r => [r.short_name, r]));
      staffById = Object.fromEntries(rows.map(r => [r.id, r]));
      staff = rows.map(r => r.short_name);
      bariatric = Object.fromEntries(rows.map(r => [r.short_name, r.is_bariatric]));
      fullnames = Object.fromEntries(
        rows.filter(r => r.display_name).map(r => [r.short_name, r.display_name])
      );
    }

    // Converts a Supabase ISO date string ("2026-03-15") to { y, m, d }
    // where m is 0-indexed to match JS Date / cellKey conventions.
    function isoToDateParts(iso) {
      const [y, mo, d] = iso.split('-').map(Number);
      return { y, m: mo - 1, d };
    }

    // Converts (y, 0-indexed m, d) to ISO date string "2026-03-15".
    function isoFromParts(y, m, d) {
      return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    }

    // Converts a weekKey "2026-3-2" to ISO date string "2026-03-02".
    function isoFromWeekKey(wk) {
      const [y, m, d] = wk.split('-').map(Number);
      return `${y}-${String(m).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3000);
    }

    async function fetchAssignments() {
      const { data: rows, error } = await sb.from('assignments').select('*');
      if (error) return; // keep localStorage fallback
      data = {};
      for (const row of rows) {
        const staffRow = staffById[row.person_id];
        if (!staffRow) continue;
        const { y, m, d } = isoToDateParts(row.date);
        data[cellKey(y, m, d, staffRow.short_name)] = {
          am: row.am,
          pm: row.pm,
          oncall_am: row.oncall_am,
          oncall_pm: row.oncall_pm,
          exception: row.exception,
        };
      }
    }

    async function fetchBariCall() {
      const { data: rows, error } = await sb.from('bari_call').select('*');
      if (error) return; // keep localStorage fallback
      bariCall = {};
      for (const row of rows) {
        if (!row.person_id) continue;
        const staffRow = staffById[row.person_id];
        if (!staffRow) continue;
        const { y, m, d } = isoToDateParts(row.week_start);
        bariCall[`${y}-${m + 1}-${d}`] = staffRow.short_name;
      }
    }

    async function fetchProfiles() {
      const { data: rows, error } = await sb.from('profiles').select('*').order('email');
      if (!error) profileRows = rows;
    }

    function renderUsersList() {
      const adminCount = profileRows.filter(p => p.role === 'admin').length;
      const list = document.getElementById('usersList');
      list.innerHTML = profileRows.map(p => {
        const isLastAdmin = p.role === 'admin' && adminCount === 1;
        return `
        <div class="user-item" data-id="${p.id}">
          <span class="user-email">${esc(p.email)}</span>
          <select class="role-select" data-id="${p.id}">
            <option value="viewer"${p.role === 'viewer' ? ' selected' : ''}>Viewer</option>
            <option value="scheduler"${p.role === 'scheduler' ? ' selected' : ''}>Scheduler</option>
            <option value="admin"${p.role === 'admin' ? ' selected' : ''}>Admin</option>
          </select>
          <button class="remove-btn" data-id="${p.id}" aria-label="Remove"
            ${isLastAdmin ? 'disabled title="Cannot remove the only admin"' : ''}>&#x2715;</button>
        </div>`;
      }).join('');

      list.querySelectorAll('.role-select').forEach(sel => {
        sel.addEventListener('change', async () => {
          const row = profileRows.find(p => p.id === sel.dataset.id);
          // Prevent demoting the only admin
          if (row && row.role === 'admin' && sel.value !== 'admin') {
            if (profileRows.filter(p => p.role === 'admin').length === 1) {
              showToast('Cannot change role — this is the only admin.');
              sel.value = 'admin';
              return;
            }
          }
          const { error } = await sb.from('profiles').update({ role: sel.value }).eq('id', sel.dataset.id);
          if (error) {
            showToast('Role update failed — please try again.');
            if (row) sel.value = row.role;
          } else {
            if (row) row.role = sel.value;
            renderUsersList(); // re-render to update last-admin state
          }
        });
      });

      list.querySelectorAll('.user-item .remove-btn:not([disabled])').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Remove this user? They will lose access immediately.')) return;
          const { error } = await sb.from('profiles').delete().eq('id', btn.dataset.id);
          if (error) { showToast('Remove failed — please try again.'); return; }
          profileRows = profileRows.filter(p => p.id !== btn.dataset.id);
          renderUsersList();
        });
      });
    }

    document.getElementById('addUserBtn').addEventListener('click', async () => {
      const email = document.getElementById('newUserEmail').value.trim().toLowerCase();
      const role = document.getElementById('newUserRole').value;
      if (!email) return;
      const { error } = await sb.rpc('create_profile', { user_email: email, user_role: role });
      if (error) {
        showToast(error.message.includes('No user found')
          ? `No account found for ${email}. They must sign in once first.`
          : 'Add user failed — please try again.');
        return;
      }
      document.getElementById('newUserEmail').value = '';
      await fetchProfiles();
      renderUsersList();
    });

    function setupRealtimeSubscriptions() {
      if (realtimeChannel) sb.removeChannel(realtimeChannel);
      realtimeChannel = sb.channel('db-changes')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'assignments' }, payload => {
          const { eventType, new: n, old: o } = payload;
          if (eventType === 'DELETE') {
            const staffRow = staffById[o.person_id];
            if (!staffRow) return;
            const { y, m, d } = isoToDateParts(o.date);
            delete data[cellKey(y, m, d, staffRow.short_name)];
          } else {
            const staffRow = staffById[n.person_id];
            if (!staffRow) return;
            const { y, m, d } = isoToDateParts(n.date);
            data[cellKey(y, m, d, staffRow.short_name)] = {
              am: n.am, pm: n.pm,
              oncall_am: n.oncall_am, oncall_pm: n.oncall_pm,
              exception: n.exception,
            };
          }
          render();
          updateDaySummary();
        })
        .on('postgres_changes', { event: '*', schema: 'public', table: 'bari_call' }, payload => {
          const { eventType, new: n, old: o } = payload;
          if (eventType === 'DELETE') {
            const { y, m, d } = isoToDateParts(o.week_start);
            delete bariCall[`${y}-${m + 1}-${d}`];
          } else {
            const staffRow = n.person_id ? staffById[n.person_id] : null;
            const { y, m, d } = isoToDateParts(n.week_start);
            const wk = `${y}-${m + 1}-${d}`;
            if (staffRow) bariCall[wk] = staffRow.short_name;
            else delete bariCall[wk];
          }
          render();
          updateDaySummary();
        })
        .subscribe();
    }

    function weekKey(sat) {
      // Monday of the week containing sat (sat.getDay() === 6, so mon = sat - 5)
      const mon = new Date(sat);
      mon.setDate(sat.getDate() - 5);
      return `${mon.getFullYear()}-${mon.getMonth() + 1}-${mon.getDate()}`;
    }

    // Call duties run 7:00 AM Eastern → 7:00 AM Eastern the next day.
    // Before 7:00 AM ET the previous day's assignments still apply.
    function callDate() {
      const now = new Date();
      const etHour = parseInt(
        new Intl.DateTimeFormat('en-US', {
          timeZone: 'America/New_York',
          hour: 'numeric',
          hour12: false,
        }).formatToParts(now).find(p => p.type === 'hour').value,
        10
      );
      if (etHour < 7) {
        const d = new Date(now);
        d.setDate(d.getDate() - 1);
        return d;
      }
      return now;
    }

    function todayWeekKey() {
      // Monday of the current call-day's week, matching weekKey() convention
      const d = callDate();
      const offset = (d.getDay() + 6) % 7; // Mon=0 … Sun=6
      d.setDate(d.getDate() - offset);
      return `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
    }

    function todayDataDate() {
      // Sunday's data lives under Saturday in our model
      const d = callDate();
      if (d.getDay() === 0) {
        d.setDate(d.getDate() - 1);
      }
      return [d.getFullYear(), d.getMonth(), d.getDate()];
    }

    function cellKey(y, m, d, person) { return `${y}-${m + 1}-${d}-${person}`; }

    function getCell(y, m, d, person) {
      const c = data[cellKey(y, m, d, person)] || {};
      const legacy = c.oncall || 'none'; // backwards compat
      return {
        am: c.am || '',
        pm: c.pm || '',
        oncall_am: c.oncall_am || legacy,
        oncall_pm: c.oncall_pm || legacy,
        exception: c.exception || false,
      };
    }

    function setCell(y, m, d, person, val) {
      const key = cellKey(y, m, d, person);
      const prev = data[key];
      data[key] = val;
      const staffRow = staffByShortName[person];
      if (staffRow) {
        sb.from('assignments').upsert({
          date: isoFromParts(y, m, d),
          person_id: staffRow.id,
          am: val.am, pm: val.pm,
          oncall_am: val.oncall_am, oncall_pm: val.oncall_pm,
          exception: val.exception,
        }, { onConflict: 'date,person_id' }).then(({ error }) => {
          if (error) {
            if (prev !== undefined) data[key] = prev; else delete data[key];
            render();
            showToast('Save failed — please try again.');
          }
        });
      }
    }

    function clearCell(y, m, d, person) {
      const key = cellKey(y, m, d, person);
      const prev = data[key];
      delete data[key];
      const staffRow = staffByShortName[person];
      if (staffRow) {
        sb.from('assignments')
          .delete()
          .eq('date', isoFromParts(y, m, d))
          .eq('person_id', staffRow.id)
          .then(({ error }) => {
            if (error) {
              if (prev !== undefined) data[key] = prev;
              render();
              showToast('Delete failed — please try again.');
            }
          });
      }
    }

    // ─────────────────────────────────────────────
    //  Helpers
    // ─────────────────────────────────────────────
    function esc(s) {
      return String(s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // Abbreviate long values to fit narrow cells
    function abbr(s) {
      if (!s) return '';
      if (s === 'unavailable') return 'unavail';
      return s;
    }

    // Truncate name to fit name column
    function shortName(s) {
      return s.length > 4 ? s.slice(0, 4) : s;
    }

    // ─────────────────────────────────────────────
    //  Multi-month scroll rendering
    // ─────────────────────────────────────────────

    function prevMo(y, m) { return m === 0 ? { y: y - 1, m: 11 } : { y, m: m - 1 }; }
    function nextMo(y, m) { return m === 11 ? { y: y + 1, m: 0 } : { y, m: m + 1 }; }

    function buildMonthHTML(ry, rm) {
      const firstDow = new Date(ry, rm, 1).getDay();
      const monOffset = firstDow === 0 ? 6 : firstDow - 1;
      const cur = new Date(ry, rm, 1 - monOffset);
      const lastDay = new Date(ry, rm + 1, 0);
      const lastDow = lastDay.getDay();
      const end = new Date(ry, rm + 1, lastDow === 0 ? 0 : 7 - lastDow);
      let html = '';
      while (cur <= end) {
        for (let i = 0; i < 5; i++) {
          html += renderDayCell(new Date(cur), ry, rm);
          cur.setDate(cur.getDate() + 1);
        }
        const sat = new Date(cur); cur.setDate(cur.getDate() + 1);
        const sun = new Date(cur); cur.setDate(cur.getDate() + 1);
        html += renderWeekendCell(sat, sun, ry, rm);
      }
      return html;
    }

    let headingObserver, loadObserver, topSentinel, bottomSentinel;

    function createMonthSection(y, m) {
      const sec = document.createElement('div');
      sec.className = 'month-section';
      sec.id = `month-${y}-${m}`;
      sec.dataset.y = y; sec.dataset.m = m;

      const hdg = document.createElement('div');
      hdg.className = 'month-heading';
      hdg.textContent = `${MONTHS[m]} ${y}`;
      sec.appendChild(hdg);

      const grid = document.createElement('div');
      grid.className = 'cal-grid';
      grid.innerHTML = buildMonthHTML(y, m);
      grid.onclick = e => {
        if (e.target.closest('.backup-select')) return;
        const row = e.target.closest('[data-person]');
        if (!row) return;
        openEdit(+row.dataset.y, +row.dataset.m, +row.dataset.d, row.dataset.person);
      };
      grid.addEventListener('change', e => {
        const sel = e.target.closest('.bari-call-select');
        if (!sel) return;
        const wk = sel.dataset.wk;
        const prev = bariCall[wk];
        if (sel.value) bariCall[wk] = sel.value; else delete bariCall[wk];
        updateDaySummary();
        const weekStart = isoFromWeekKey(wk);
        const staffRow = sel.value ? staffByShortName[sel.value] : null;
        (async () => {
          let error;
          if (staffRow) {
            ({ error } = await sb.from('bari_call').upsert({ week_start: weekStart, person_id: staffRow.id }));
          } else {
            ({ error } = await sb.from('bari_call').delete().eq('week_start', weekStart));
          }
          if (error) {
            if (prev !== undefined) bariCall[wk] = prev; else delete bariCall[wk];
            updateDaySummary();
            showToast('Save failed — please try again.');
          }
        })();
      });
      setupGridDrag(grid);
      sec.appendChild(grid);

      if (headingObserver) headingObserver.observe(hdg);
      return sec;
    }

    function reRenderMonth(y, m) {
      const sec = document.getElementById(`month-${y}-${m}`);
      if (!sec) return;
      sec.querySelector('.cal-grid').innerHTML = buildMonthHTML(y, m);
    }

    function render() {
      document.querySelectorAll('.month-section').forEach(sec => {
        sec.querySelector('.cal-grid').innerHTML = buildMonthHTML(+sec.dataset.y, +sec.dataset.m);
      });
    }

    function getContainer() { return document.querySelector('.cal-container'); }
    function getApp() { return document.querySelector('.app'); }

    function appendNextMonth() {
      const sections = getContainer().querySelectorAll('.month-section');
      const last = sections[sections.length - 1];
      const { y, m } = nextMo(+last.dataset.y, +last.dataset.m);
      getContainer().insertBefore(createMonthSection(y, m), bottomSentinel);
    }

    function prependPrevMonth() {
      const first = getContainer().querySelector('.month-section');
      const { y, m } = prevMo(+first.dataset.y, +first.dataset.m);
      const app = getApp();
      const prevST = app.scrollTop;
      const prevH = getContainer().scrollHeight;
      getContainer().insertBefore(createMonthSection(y, m), first);
      app.scrollTop = prevST + (getContainer().scrollHeight - prevH);
    }

    // ─────────────────────────────────────────────
    //  Drag-to-reassign call
    // ─────────────────────────────────────────────
    let dragSrc = null;

    function setupGridDrag(grid) {
      let dragInitiatedFrom = null;

      // mousedown always fires before dragstart, so we can record
      // which child element the drag originated from
      grid.addEventListener('mousedown', e => { dragInitiatedFrom = e.target; });

      grid.addEventListener('dragstart', e => {
        const row = e.target.closest('[data-person]');
        if (!row) return;
        const y = +row.dataset.y, m = +row.dataset.m, d = +row.dataset.d, person = row.dataset.person;
        const cell = getCell(y, m, d, person);
        if (cell.oncall_am === 'none' && cell.oncall_pm === 'none') { e.preventDefault(); return; }

        // Dragging from the PM/Sun slot moves only that half; anything else moves the whole pill
        const pmDrag = !!(dragInitiatedFrom && dragInitiatedFrom.closest('.pm-val'));
        if (pmDrag && cell.oncall_pm === 'none') { e.preventDefault(); return; }

        dragSrc = { y, m, d, person, half: pmDrag ? 'pm' : 'both' };
        e.dataTransfer.effectAllowed = 'move';
        row.classList.add('drag-source');
      });

      grid.addEventListener('dragover', e => {
        if (!dragSrc) return;
        const row = e.target.closest('[data-person]');
        if (!row) return;
        if (+row.dataset.y === dragSrc.y && +row.dataset.m === dragSrc.m &&
          +row.dataset.d === dragSrc.d && row.dataset.person !== dragSrc.person) {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          row.classList.add('drag-over');
        }
      });

      grid.addEventListener('dragleave', e => {
        const row = e.target.closest('[data-person]');
        if (row && !row.contains(e.relatedTarget)) row.classList.remove('drag-over');
      });

      grid.addEventListener('drop', e => {
        if (!dragSrc) return;
        const row = e.target.closest('[data-person]');
        if (!row) return;
        const ty = +row.dataset.y, tm = +row.dataset.m, td = +row.dataset.d, tPerson = row.dataset.person;
        if (ty !== dragSrc.y || tm !== dragSrc.m || td !== dragSrc.d || tPerson === dragSrc.person) return;
        e.preventDefault();
        const src = getCell(dragSrc.y, dragSrc.m, dragSrc.d, dragSrc.person);
        const tgt = getCell(ty, tm, td, tPerson);
        if (dragSrc.half === 'pm') {
          setCell(dragSrc.y, dragSrc.m, dragSrc.d, dragSrc.person, { ...src, oncall_pm: 'none' });
          setCell(ty, tm, td, tPerson, { ...tgt, oncall_pm: src.oncall_pm });
        } else {
          setCell(dragSrc.y, dragSrc.m, dragSrc.d, dragSrc.person, { ...src, oncall_am: 'none', oncall_pm: 'none' });
          // Only overwrite target slots that the source actually carries; preserve any
          // values already on the target (e.g. a PM half dragged there in a prior move)
          setCell(ty, tm, td, tPerson, {
            ...tgt,
            ...(src.oncall_am !== 'none' && { oncall_am: src.oncall_am }),
            ...(src.oncall_pm !== 'none' && { oncall_pm: src.oncall_pm }),
          });
        }
        reRenderMonth(ty, tm);
        updateDaySummary();
        dragSrc = null;
      });

      grid.addEventListener('dragend', () => {
        dragSrc = null;
        document.querySelectorAll('.drag-source, .drag-over').forEach(el => {
          el.classList.remove('drag-source', 'drag-over');
        });
      });
    }

    function stickyOffset() {
      return document.querySelector('.topbar').offsetHeight +
        document.querySelector('.day-headers').offsetHeight;
    }

    function scrollSecToTop(sec, behavior) {
      const app = getApp();
      const stickyBottom = document.querySelector('.day-headers').getBoundingClientRect().bottom;
      const rect = sec.getBoundingClientRect();
      app.scrollTo({ top: app.scrollTop + rect.top - stickyBottom, behavior });
    }

    // Append months below `y/m` until scrollTop can actually reach sec.offsetTop - stickyOffset()
    function ensureHeadroom(y, m) {
      const app = getApp();
      const sec = document.getElementById(`month-${y}-${m}`);
      if (!sec) return;
      let guard = 0;
      while (sec.offsetTop - stickyOffset() + app.clientHeight > app.scrollHeight && guard++ < 8) { // guard: max 8 appends to prevent infinite loop
        appendNextMonth();
      }
    }

    function scrollToMonth(y, m) {
      if (!document.getElementById(`month-${y}-${m}`)) {
        initScroll(y, m); return;
      }
      ensureHeadroom(y, m);
      scrollSecToTop(document.getElementById(`month-${y}-${m}`), 'instant');
    }

    function initScroll(y, m) {
      if (loadObserver) loadObserver.disconnect();

      const container = getContainer();
      container.querySelectorAll('.month-section').forEach(s => s.remove());
      const pm = prevMo(y, m), nm = nextMo(y, m);
      [pm, { y, m }, nm].forEach(({ y: ry, m: rm }) =>
        container.insertBefore(createMonthSection(ry, rm), bottomSentinel)
      );
      viewYear = y; viewMonth = m;
      document.getElementById('monthLabel').textContent = `${MONTHS[m]} ${y}`;

      ensureHeadroom(y, m);
      const sec = document.getElementById(`month-${y}-${m}`);
      if (sec) scrollSecToTop(sec, 'instant');

      requestAnimationFrame(() => {
        if (loadObserver) {
          loadObserver.observe(topSentinel);
          loadObserver.observe(bottomSentinel);
        }
      });
    }

    function setupObservers() {
      const app = getApp();
      const container = getContainer();

      topSentinel = document.createElement('div');
      topSentinel.className = 'scroll-sentinel';
      bottomSentinel = document.createElement('div');
      bottomSentinel.className = 'scroll-sentinel';
      container.prepend(topSentinel);
      container.append(bottomSentinel);

      loadObserver = new IntersectionObserver(entries => {
        for (const entry of entries) {
          if (!entry.isIntersecting) continue;
          if (entry.target === topSentinel) prependPrevMonth();
          if (entry.target === bottomSentinel) appendNextMonth();
        }
      }, { root: app, rootMargin: '300px' }); // preload sentinels 300px before they enter the viewport
      loadObserver.observe(topSentinel);
      loadObserver.observe(bottomSentinel);

      headingObserver = new IntersectionObserver(entries => {
        for (const entry of entries) {
          if (entry.isIntersecting) {
            const sec = entry.target.closest('.month-section');
            if (sec) {
              viewYear = +sec.dataset.y;
              viewMonth = +sec.dataset.m;
              document.getElementById('monthLabel').textContent = `${MONTHS[viewMonth]} ${viewYear}`;
            }
            break;
          }
        }
      }, { root: app, rootMargin: `-${stickyOffset()}px 0px -55% 0px` });
      // -55%: only headings in the top half of the viewport update the label
    }

    function renderDayCell(date, ry, rm) {
      const d = date.getDate(), m = date.getMonth(), y = date.getFullYear();
      const inMonth = m === rm && y === ry;
      const isToday = y === today.getFullYear() && m === today.getMonth() && d === today.getDate();

      let cls = 'day-cell';
      if (isToday) cls += ' today';
      if (!inMonth) cls += ' out-of-month';

      const dateInner = d;
      let html = `<div class="${cls}"><div class="cell-date">${dateInner}</div>`;
      if (inMonth) for (const person of staff) html += personRowHtml(y, m, d, person);
      return html + '</div>';
    }

    function renderWeekendCell(sat, sun, ry, rm) {
      const sd = sat.getDate(), sm = sat.getMonth(), sy = sat.getFullYear();
      const ud = sun.getDate(), um = sun.getMonth(), uy = sun.getFullYear();
      const satIn = sm === rm && sy === ry;
      const sunIn = um === rm && uy === ry;
      const isToday = (sy === today.getFullYear() && sm === today.getMonth() && sd === today.getDate())
        || (uy === today.getFullYear() && um === today.getMonth() && ud === today.getDate());

      // Use whichever day is in-month as the data day (Saturday takes priority)
      const [y, m, d] = satIn ? [sy, sm, sd] : [uy, um, ud];
      const inMonth = satIn || sunIn;

      let cls = 'day-cell weekend';
      if (!inMonth) cls += ' out-of-month';
      if (isToday) cls += ' today';

      const dateStr = satIn && sunIn ? `${sd} / ${ud}` : satIn ? `${sd}` : `${ud}`;
      const wk = weekKey(sat);

      const bariStaff = staff.filter(p => bariatric[p]);
      const selectedBari = bariCall[wk] || '';
      const bariOptions = `<option value=""></option>` +
        bariStaff.map(p => `<option value="${esc(p)}"${selectedBari === p ? ' selected' : ''}>${esc(shortName(p))}</option>`).join('');
      const bariSelect = inMonth && bariStaff.length
        ? `<select class="backup-select bari-call-select" data-wk="${esc(wk)}" title="Bariatric call">${bariOptions}</select>`
        : '';

      let html = `<div class="${cls}"><div class="cell-date"><span>${dateStr}</span>${bariSelect ? `<span class="wk-selects">${bariSelect}</span>` : ''}</div>`;
      if (inMonth) for (const person of staff) html += personRowHtml(y, m, d, person);
      return html + '</div>';
    }

    function personRowHtml(y, m, d, person) {
      const { am, pm, oncall_am, oncall_pm, exception } = getCell(y, m, d, person);
      const nm = esc(shortName(person));
      if (am === 'CLOSED') {
        const callCls = oncall_am !== 'none' ? ` oncall-${oncall_am}` : oncall_pm !== 'none' ? ` oncall-${oncall_pm}` : '';
        return `<div class="closed-row${callCls}" data-y="${y}" data-m="${m}" data-d="${d}" data-person="${esc(person)}">
          <span class="pname-closed">${nm}</span><span class="closed-label">CLOSED</span>
        </div>`;
      }
      const amTxt = abbr(am), pmTxt = abbr(pm);
      const amCls = 'am-val' + (amTxt ? '' : ' empty') + (oncall_am !== 'none' ? ` oncall-${oncall_am}` : '') + (am === 'hosp' ? ' hosp' : '') + (exception ? ' exception' : '');
      const pmCls = 'pm-val' + (pmTxt ? '' : ' empty') + (oncall_pm !== 'none' ? ` oncall-${oncall_pm}` : '') + (pm === 'hosp' ? ' hosp' : '');
      const draggable = (oncall_am !== 'none' || oncall_pm !== 'none') ? ' draggable="true"' : '';
      return `<div class="person-row"${draggable} data-y="${y}" data-m="${m}" data-d="${d}" data-person="${esc(person)}">
        <span class="pname">${nm}</span>
        <span class="slots">
          <span class="${amCls}">${amTxt ? esc(amTxt) : '—'}</span>
          <span class="slot-sep"></span>
          <span class="${pmCls}">${pmTxt ? esc(pmTxt) : '—'}</span>
        </span>
      </div>`;
    }

    // ─────────────────────────────────────────────
    //  Edit modal
    // ─────────────────────────────────────────────
    let editState = { am: '', pm: '', oncall_am: 'none', oncall_pm: 'none', exception: false };

    const ONCALL_VALS = ['none', 'single', 'double'];
    const ONCALL_LABEL = { none: '<u>N</u>o call', single: '<u>S</u>ingle', double: '<u>D</u>ouble' };
    const ASSIGN_LABEL = { '': '— none —', unavailable: 'unavail' };

    function renderChoiceGrid() {
      const dow = editing && new Date(editing.y, editing.m, editing.d).getDay();
      const isWeekend = dow === 6 || dow === 0;
      const colA = isWeekend ? 'Sat' : 'AM';
      const colB = isWeekend ? 'Sun' : 'PM';
      const dis = isWeekend ? ' cg-disabled' : '';

      // Left column: assignment choices
      let assignHtml = `<div class="cg-grid">
        <div></div>
        <div class="cg-col-hdr">${colA}</div>
        <div class="cg-col-hdr">${colB}</div>`;

      for (const val of ASSIGNMENTS) {
        assignHtml += `<div class="cg-label${dis}" data-asgn="${esc(val)}" style="${dis ? '' : 'cursor:pointer'}">${labelHtml(val)}</div>
          <button class="cg-btn asgn-am${editState.am === val ? ' active' : ''}${dis}" data-val="${esc(val)}"></button>
          <button class="cg-btn asgn-pm${editState.pm === val ? ' active' : ''}${dis}" data-val="${esc(val)}"></button>`;
      }
      assignHtml += '</div>';

      // Right column: on-call + action buttons
      let oncallHtml = `<div class="cg-grid cg-oncall">
        <div></div>
        <div class="cg-col-hdr">${colA}</div>
        <div class="cg-col-hdr">${colB}</div>`;

      for (const val of ONCALL_VALS) {
        oncallHtml += `<div class="cg-label" data-oncall="${val}" style="cursor:pointer">${ONCALL_LABEL[val]}</div>
          <button class="cg-btn oncall-am${editState.oncall_am === val ? ' active' : ''} ${val !== 'none' ? val : ''}" data-val="${val}"></button>
          <button class="cg-btn oncall-pm${editState.oncall_pm === val ? ' active' : ''} ${val !== 'none' ? val : ''}" data-val="${val}"></button>`;
      }
      oncallHtml += `<div class="cg-divider"></div>
        <div class="cg-label" data-oncall="exception" style="cursor:pointer"><u>E</u>xception</div>
        <button class="cg-btn exception-am${editState.exception ? ' active exception' : ''}"></button>
        <button class="cg-btn cg-disabled"></button>`;
      oncallHtml += '</div>';

      const actionsHtml = `<div class="action-grid">
        <button class="btn btn-cancel  edit-cancel">Cancel</button>
        <button class="btn btn-save    edit-save">Save</button>
        <button class="btn btn-advance edit-advance">Save &#8594;</button>
      </div>`;

      const html = `<div class="edit-layout">
        <div class="assign-col">${assignHtml}</div>
        <div class="right-col">${oncallHtml}${actionsHtml}</div>
      </div>`;

      const grid = document.getElementById('choiceGrid');
      grid.innerHTML = html;

      grid.querySelectorAll('.asgn-am').forEach(btn =>
        btn.addEventListener('click', () => {
          if (btn.dataset.val === 'CLOSED' && editing) {
            const { y, m, d } = editing;
            for (const p of staff) {
              setCell(y, m, d, p, { am: 'CLOSED', pm: '', oncall_am: 'none', oncall_pm: 'none' });
            }
            closeEdit(); reRenderMonth(y, m); return;
          }
          editState.am = editState.pm = btn.dataset.val;
          renderChoiceGrid();
        }));

      grid.querySelectorAll('.asgn-pm').forEach(btn =>
        btn.addEventListener('click', () => { editState.pm = btn.dataset.val; renderChoiceGrid(); }));

      grid.querySelectorAll('.oncall-am').forEach(btn =>
        btn.addEventListener('click', () => {
          editState.oncall_am = editState.oncall_pm = btn.dataset.val; renderChoiceGrid();
        }));

      grid.querySelectorAll('.oncall-pm').forEach(btn =>
        btn.addEventListener('click', () => { editState.oncall_pm = btn.dataset.val; renderChoiceGrid(); }));

      grid.querySelector('.exception-am').addEventListener('click', () => {
        editState.exception = !editState.exception; renderChoiceGrid();
      });

      grid.querySelectorAll('.cg-label[data-asgn]').forEach(lbl => {
        if (lbl.classList.contains('cg-disabled')) return;
        lbl.addEventListener('click', () => {
          const val = lbl.dataset.asgn;
          if (val === 'CLOSED' && editing) {
            const { y, m, d } = editing;
            for (const p of staff) setCell(y, m, d, p, { am: 'CLOSED', pm: '', oncall_am: 'none', oncall_pm: 'none' });
            closeEdit(); reRenderMonth(y, m); return;
          }
          editState.am = editState.pm = val;
          renderChoiceGrid();
        });
      });

      grid.querySelectorAll('.cg-label[data-oncall]').forEach(lbl => {
        lbl.addEventListener('click', () => {
          const val = lbl.dataset.oncall;
          if (val === 'exception') { editState.exception = !editState.exception; }
          else { editState.oncall_am = editState.oncall_pm = val; }
          renderChoiceGrid();
        });
      });

      grid.querySelector('.edit-save').addEventListener('click', () => {
        if (doSave() !== false) {
          const { y, m } = editing;
          closeEdit();
          reRenderMonth(y, m);
        }
      });
      grid.querySelector('.edit-advance').addEventListener('click', saveAndAdvance);
      grid.querySelector('.edit-cancel').addEventListener('click', closeEdit);
    }

    function setEditHighlight(y, m, d, person) {
      document.querySelectorAll('.editing-highlight').forEach(el => el.classList.remove('editing-highlight'));
      if (y == null) return;
      document.querySelectorAll(`[data-y="${y}"][data-m="${m}"][data-d="${d}"]`).forEach(el => {
        if (el.dataset.person === person) el.classList.add('editing-highlight');
      });
    }

    function openEdit(y, m, d, person) {
      editing = { y, m, d, person };
      const cell = getCell(y, m, d, person);
      const dow = DAYS[new Date(y, m, d).getDay()];

      document.getElementById('editTitle').textContent =
        `${person} — ${dow} ${MONTHS[m]} ${d}`;

      editState = { am: cell.am, pm: cell.pm, oncall_am: cell.oncall_am, oncall_pm: cell.oncall_pm, exception: cell.exception };
      document.getElementById('editClearBtn').onclick = () => {
        clearCell(y, m, d, person); closeEdit(); reRenderMonth(y, m);
      };
      renderChoiceGrid();
      setEditHighlight(y, m, d, person);
      document.getElementById('editOverlay').classList.add('open');
    }

    function closeEdit() {
      document.getElementById('editOverlay').classList.remove('open');
      setEditHighlight(null);
      editing = null;
    }

    const KEY_SHORTCUTS = { o: 'ov', h: 'hosp', c: 'C-surg', f: 'F-surg', a: 'admin', u: 'unavailable' };

    // Returns display label with the shortcut letter underlined
    function labelHtml(val) {
      const raw = ASSIGN_LABEL[val] ?? val;
      const key = Object.keys(KEY_SHORTCUTS).find(k => KEY_SHORTCUTS[k] === val);
      if (!key) return esc(raw);
      const idx = raw.toLowerCase().indexOf(key.toLowerCase());
      if (idx === -1) return esc(raw);
      return esc(raw.slice(0, idx)) + '<u>' + esc(raw[idx]) + '</u>' + esc(raw.slice(idx + 1));
    }

    function doSave() {
      if (!editing) return true;
      const { y, m, d, person } = editing;
      const { am, pm, oncall_am, oncall_pm, exception } = editState;

      // Validate on-call conflicts (include Saturday if saving a Friday)
      const isFriday = new Date(y, m, d).getDay() === 5;
      const sat = isFriday ? new Date(y, m, d + 1) : null;
      const [sy, sm, sd2] = sat ? [sat.getFullYear(), sat.getMonth(), sat.getDate()] : [];

      const conflicts = [];
      for (const p of staff) {
        if (p === person) continue;
        const c = getCell(y, m, d, p);
        if (oncall_am !== 'none' && c.oncall_am !== 'none') conflicts.push({ p, col: 'AM', day: 'Fri' });
        if (oncall_pm !== 'none' && c.oncall_pm !== 'none') conflicts.push({ p, col: 'PM', day: 'Fri' });
        if (isFriday) {
          const cs = getCell(sy, sm, sd2, p);
          if (oncall_am !== 'none' && cs.oncall_am !== 'none') conflicts.push({ p, col: 'AM', day: 'Sat' });
          if (oncall_pm !== 'none' && cs.oncall_pm !== 'none') conflicts.push({ p, col: 'PM', day: 'Sat' });
        }
      }
      if (conflicts.length) {
        const names = conflicts.map(c => `${c.p} (${c.col} ${c.day})`).join(', ');
        const ok = confirm(
          `On-call conflict with: ${names}.\n\nAccept to reassign call to ${person} and clear the conflict, or Cancel to go back.`
        );
        if (!ok) return false;
        for (const { p, col, day } of conflicts) {
          if (day === 'Sat') {
            const cs = getCell(sy, sm, sd2, p);
            setCell(sy, sm, sd2, p, { ...cs, [col === 'AM' ? 'oncall_am' : 'oncall_pm']: 'none' });
          } else {
            const c = getCell(y, m, d, p);
            setCell(y, m, d, p, { ...c, [col === 'AM' ? 'oncall_am' : 'oncall_pm']: 'none' });
          }
        }
      }

      // Validate hosp conflicts
      const hospConflicts = [];
      for (const p of staff) {
        if (p === person) continue;
        const c = getCell(y, m, d, p);
        if (am === 'hosp' && c.am === 'hosp') hospConflicts.push({ p, col: 'AM' });
        if (pm === 'hosp' && c.pm === 'hosp') hospConflicts.push({ p, col: 'PM' });
      }
      if (hospConflicts.length) {
        const names = hospConflicts.map(c => `${c.p} (${c.col})`).join(', ');
        const ok = confirm(
          `Hosp conflict with: ${names}.\n\nAccept to reassign hosp to ${person} and clear the conflict, or Cancel to go back.`
        );
        if (!ok) return false;
        for (const { p, col } of hospConflicts) {
          const c = getCell(y, m, d, p);
          setCell(y, m, d, p, { ...c, [col === 'AM' ? 'am' : 'pm']: '' });
        }
      }

      setCell(y, m, d, person, { am, pm, oncall_am, oncall_pm, exception });
      if (new Date(y, m, d).getDay() === 5) {
        const sat = new Date(y, m, d + 1);
        setCell(sat.getFullYear(), sat.getMonth(), sat.getDate(), person,
          { ...getCell(sat.getFullYear(), sat.getMonth(), sat.getDate(), person), oncall_am, oncall_pm });
      }
      updateDaySummary();
      return true;
    }

    function saveAndAdvance() {
      if (!editing) return;
      if (doSave() === false) return;
      const { y, m, d, person } = editing;
      reRenderMonth(y, m);
      const dow = new Date(y, m, d).getDay();
      const next = dow === 5 ? new Date(y, m, d + 1)
        : dow === 6 ? new Date(y, m, d + 2)
          : new Date(y, m, d + 1);
      const ny = next.getFullYear(), nm = next.getMonth(), nd = next.getDate();
      if (nm !== m || ny !== y) scrollToMonth(ny, nm);
      else if (!document.getElementById(`month-${ny}-${nm}`)) appendNextMonth();
      openEdit(ny, nm, nd, person);
    }

    function saveAndRetreat() {
      if (!editing) return;
      if (doSave() === false) return;
      const { y, m, d, person } = editing;
      reRenderMonth(y, m);
      const dow = new Date(y, m, d).getDay();
      const prev = dow === 1 ? new Date(y, m, d - 2)   // Mon → skip back to Sat
        : dow === 0 ? new Date(y, m, d - 1)   // Sun → Sat
          : new Date(y, m, d - 1);
      const py = prev.getFullYear(), pm2 = prev.getMonth(), pd = prev.getDate();
      if (pm2 !== m || py !== y) scrollToMonth(py, pm2);
      else if (!document.getElementById(`month-${py}-${pm2}`)) appendNextMonth();
      openEdit(py, pm2, pd, person);
    }

    document.addEventListener('keydown', e => {
      if (!document.getElementById('editOverlay').classList.contains('open')) return;
      if (e.key === 'Tab' && !e.shiftKey) { e.preventDefault(); saveAndAdvance(); return; }
      if (e.key === 'Tab' && e.shiftKey) { e.preventDefault(); saveAndRetreat(); return; }
      if (e.key === 'Enter') { if (doSave() !== false) { const { y, m } = editing; closeEdit(); reRenderMonth(y, m); } return; }
      if (e.key === 'Escape') { closeEdit(); return; }

      const key = e.key.toLowerCase();
      if (KEY_SHORTCUTS[key]) {
        editState.am = editState.pm = KEY_SHORTCUTS[key];
        renderChoiceGrid();
        return;
      }
      // 'b' cycles ba-C → ba-F → ba-C
      if (key === 'b') {
        editState.am = editState.pm = editState.am === 'ba-C' ? 'ba-F' : 'ba-C';
        renderChoiceGrid(); return;

      if (key === 'n') {

      if (key === 'e') {

        renderChoiceGrid(); return;
      }
      if (key === 'd') {
        editState.oncall_am = editState.oncall_pm = 'double';
        renderChoiceGrid(); return;
      }
    });

    async function saveStaffToSupabase() {
      const items = document.querySelectorAll('#staffList .staff-item');
      const keptIds = new Set();

      for (let i = 0; i < items.length; i++) {
        const item = items[i];
        const id = item.dataset.id;
        const short = item.querySelector('.staff-short').value.trim();
        const full = item.querySelector('.staff-full').value.trim();
        const isBari = item.querySelector('.bari-check').checked;
        if (!short) continue;

        if (id) {
          keptIds.add(id);
          const { error } = await sb.from('staff').update({
            short_name: short,
            display_name: full || short,
            is_bariatric: isBari,
            sort_order: i,
          }).eq('id', id);
          if (error) { showToast('Staff save failed — please try again.'); return; }
        } else {
          const { data: inserted, error } = await sb.from('staff').insert({
            short_name: short,
            display_name: full || short,
            is_bariatric: isBari,
            sort_order: i,
            active: true,
          }).select('id').single();
          if (error) { showToast('Staff save failed — please try again.'); return; }
          if (inserted) item.dataset.id = inserted.id;
        }
      }

      // Soft-delete any staff rows that were removed
      for (const row of staffRows) {
        if (!keptIds.has(row.id)) {
          await sb.from('staff').update({ active: false }).eq('id', row.id);
        }
      }

      await fetchStaff();
      render();
    }

    async function importToSupabase(imported) {
      // 1. Staff — upsert existing by short_name, insert new, soft-delete removed
      if (Array.isArray(imported.staff) && imported.staff.length) {
        const importedBariatric = imported.bariatric || {};
        const importedFullnames = imported.fullnames || {};
        for (let i = 0; i < imported.staff.length; i++) {
          const short = imported.staff[i];
          if (!short) continue;
          const existing = staffByShortName[short];
          if (existing) {
            await sb.from('staff').update({
              display_name: importedFullnames[short] || short,
              is_bariatric: !!importedBariatric[short],
              sort_order: i, active: true,
            }).eq('id', existing.id);
          } else {
            await sb.from('staff').insert({
              short_name: short,
              display_name: importedFullnames[short] || short,
              is_bariatric: !!importedBariatric[short],
              sort_order: i, active: true,
            });
          }
        }
        for (const row of staffRows) {
          if (!imported.staff.includes(row.short_name)) {
            await sb.from('staff').update({ active: false }).eq('id', row.id);
          }
        }
        await fetchStaff();
      }

      // 2. Assignments — delete all, bulk insert from imported data
      if (imported.data && typeof imported.data === 'object') {
        await sb.from('assignments').delete().not('id', 'is', null);
        const rows = [];
        for (const [key, val] of Object.entries(imported.data)) {
          const parts = key.split('-');
          const person = parts.slice(3).join('-');
          const y = parseInt(parts[0]), m = parseInt(parts[1]) - 1, d = parseInt(parts[2]);
          const staffRow = staffByShortName[person];
          if (!staffRow) continue;
          rows.push({
            date: isoFromParts(y, m, d), person_id: staffRow.id,
            am: val.am || '', pm: val.pm || '',
            oncall_am: val.oncall_am || 'none', oncall_pm: val.oncall_pm || 'none',
            exception: val.exception || false,
          });
        }
        if (rows.length) await sb.from('assignments').insert(rows);
      }

      // 3. BariCall — delete all, bulk insert from imported data
      if (imported.bariCall && typeof imported.bariCall === 'object') {
        await sb.from('bari_call').delete().not('week_start', 'is', null);
        const rows = [];
        for (const [wk, personShort] of Object.entries(imported.bariCall)) {
          const staffRow = staffByShortName[personShort];
          if (!staffRow) continue;
          rows.push({ week_start: isoFromWeekKey(wk), person_id: staffRow.id });
        }
        if (rows.length) await sb.from('bari_call').insert(rows);
      }

      await Promise.all([fetchAssignments(), fetchBariCall()]);
    }

    function setupDraggableSheet() {
      const overlay = document.getElementById('editOverlay');
      const sheet = overlay.querySelector('.sheet');
      const handle = sheet.querySelector('.sheet-handle');
      let dragging = false, startX, startY, startLeft, startTop;

      function beginDrag(cx, cy) {
        const r = sheet.getBoundingClientRect();
        startX = cx; startY = cy;
        startLeft = r.left; startTop = r.top;
        sheet.style.cssText += `;position:fixed;left:${r.left}px;top:${r.top}px;bottom:auto;width:${r.width}px;border-radius:16px;margin:0;max-height:90vh`;
        dragging = true;
      }
      function moveDrag(cx, cy) {
        if (!dragging) return;
        const left = Math.max(0, Math.min(startLeft + cx - startX, window.innerWidth - sheet.offsetWidth));
        const top = Math.max(0, Math.min(startTop + cy - startY, window.innerHeight - sheet.offsetHeight));
        sheet.style.left = left + 'px';
        sheet.style.top = top + 'px';
      }
      function endDrag() { dragging = false; }

      handle.addEventListener('mousedown', e => { beginDrag(e.clientX, e.clientY); e.preventDefault(); });
      document.addEventListener('mousemove', e => moveDrag(e.clientX, e.clientY));
      document.addEventListener('mouseup', endDrag);
      handle.addEventListener('touchstart', e => { beginDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, { passive: false });
      document.addEventListener('touchmove', e => { if (dragging) { moveDrag(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); } }, { passive: false });
      document.addEventListener('touchend', endDrag);

      // Reset to bottom-sheet only when transitioning from closed → open
      let wasOpen = overlay.classList.contains('open');
      new MutationObserver(() => {
        const isOpen = overlay.classList.contains('open');
        if (isOpen && !wasOpen) {
          sheet.style.position = '';
          sheet.style.left = ''; sheet.style.top = ''; sheet.style.bottom = '';
          sheet.style.width = ''; sheet.style.borderRadius = ''; sheet.style.margin = '';
        }
        wasOpen = isOpen;
      }).observe(overlay, { attributes: true, attributeFilter: ['class'] });
    }

    // ─────────────────────────────────────────────
    //  Boot

    // ─────────────────────────────────────────────
    //  Day summary (topbar)
    // ─────────────────────────────────────────────
    function updateDaySummary() {
      const [ty, tm, td] = todayDataDate();
      const wk = todayWeekKey();

      // On call: first person with any oncall set
      const callPerson = staff.find(p => {
        const c = getCell(ty, tm, td, p);
        return c.oncall_am !== 'none' || c.oncall_pm !== 'none';
      }) || '';

      // Backup: first person with hosp today; on weekends scan Mon–Fri of that week
      let backupPerson = staff.find(p => {
        const c = getCell(ty, tm, td, p);
        return c.am === 'hosp' || c.pm === 'hosp';
      }) || '';
      if (!backupPerson && (today.getDay() === 0 || today.getDay() === 6)) {
        // Use preceding Friday's hosp assignment
        const fri = new Date(today);
        fri.setDate(today.getDate() - (today.getDay() === 6 ? 1 : 2));
        backupPerson = staff.find(p => {
          const c = getCell(fri.getFullYear(), fri.getMonth(), fri.getDate(), p);
          return c.am === 'hosp' || c.pm === 'hosp';
        }) || '';
      }

      // Bariatric: call person if bariatric, else backup if bariatric, else dropdown
      const bariPerson = bariatric[callPerson] ? callPerson
        : bariatric[backupPerson] ? backupPerson
          : bariCall[wk] || '';

      function set(id, name) {
        const el = document.getElementById(id);
        el.textContent = name ? displayName(name) : '—';
        el.className = 'ds-value' + (name ? '' : ' empty');
      }
      set('ds-call', callPerson);
      set('ds-backup', backupPerson);
      set('ds-bari', bariPerson);
    }

    setupObservers();
    initScroll(viewYear, viewMonth);
    setupDraggableSheet();
    updateDaySummary();

    // ─────────────────────────────────────────────
    //  Scroll snap: if < 6 person-rows of a month
    //  remain visible, snap to the adjacent month
    // ─────────────────────────────────────────────
    (function setupScrollSnap() {
      const ROW_PX = 22;      // approx height of one person row (min-height 20px + margin 2px)
      const THRESHOLD_FWD = 6 * ROW_PX;   // snap forward: < 6 rows remain in current month
      const THRESHOLD_BACK = 2 * ROW_PX;  // snap back:    < 2 rows scrolled past month top
      const DEBOUNCE = 160;     // ms to wait after scroll stops before evaluating snap
      let snapTimer = null;

      getApp().addEventListener('scroll', () => {
        clearTimeout(snapTimer);
        snapTimer = setTimeout(() => {
          const sticky = document.querySelector('.day-headers').getBoundingClientRect().bottom;
          const sections = [...document.querySelectorAll('.month-section')];

          for (let i = 0; i < sections.length; i++) {
            const sec = sections[i];
            const rect = sec.getBoundingClientRect();

            // Section straddles the sticky line — partially scrolled past
            if (rect.top < sticky && rect.bottom > sticky) {
              const visibleBelow = rect.bottom - sticky;  // how much remains
              const scrolledPast = sticky - rect.top;     // how much is hidden above

              if (visibleBelow < THRESHOLD_FWD && sections[i + 1]) {
                // Almost past this month — snap forward to next
                ensureHeadroom(+sections[i + 1].dataset.y, +sections[i + 1].dataset.m);
                requestAnimationFrame(() => scrollSecToTop(sections[i + 1], 'smooth'));
              } else if (scrolledPast < THRESHOLD_BACK) {
                // Barely into this month — snap back to its top
                requestAnimationFrame(() => scrollSecToTop(sec, 'smooth'));
              }
              break;
            }
          }
        }, DEBOUNCE);
      });
    })();

  </script>
